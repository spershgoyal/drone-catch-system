// ============================================================================
// ROLLING CHART (used in graphs tab)
// ============================================================================
function LineChart({ traces, height = 140, yMin, yMax, label }) {
  // traces: [{ data: [{t, v}], color, label }]
  const ref = useRef(null);
  useEffect(() => {
    const cv = ref.current;
    if (!cv) return;
    const dpr = window.devicePixelRatio || 1;
    const w = cv.clientWidth, h = cv.clientHeight;
    cv.width = w * dpr;
    cv.height = h * dpr;
    const ctx = cv.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);
    // bg
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, w, h);
    // grid
    ctx.strokeStyle = 'rgba(10,10,10,0.06)';
    ctx.lineWidth = 1;
    for (let i = 1; i < 10; i++) {
      ctx.beginPath();
      ctx.moveTo((i / 10) * w, 0);
      ctx.lineTo((i / 10) * w, h);
      ctx.stroke();
    }
    for (let i = 1; i < 5; i++) {
      ctx.beginPath();
      ctx.moveTo(0, (i / 5) * h);
      ctx.lineTo(w, (i / 5) * h);
      ctx.stroke();
    }
    // border
    ctx.strokeStyle = '#0a0a0a';
    ctx.lineWidth = 1;
    ctx.strokeRect(0.5, 0.5, w - 1, h - 1);
    // zero line
    if (yMin < 0 && yMax > 0) {
      const zy = h - ((0 - yMin) / (yMax - yMin)) * h;
      ctx.strokeStyle = '#0a0a0a';
      ctx.setLineDash([2, 2]);
      ctx.beginPath();
      ctx.moveTo(0, zy);
      ctx.lineTo(w, zy);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    // collect time range
    const allT = traces.flatMap(t => t.data.map(p => p.t));
    if (allT.length === 0) return;
    const tMax = Math.max(...allT);
    const tMin = tMax - 12000; // 12s window
    // draw each trace
    for (const tr of traces) {
      const data = tr.data.filter(p => p.t >= tMin);
      if (data.length < 2) continue;
      ctx.strokeStyle = tr.color;
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      for (let i = 0; i < data.length; i++) {
        const x = ((data[i].t - tMin) / (tMax - tMin)) * w;
        const y = h - ((data[i].v - yMin) / (yMax - yMin)) * h;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  });
  return <canvas ref={ref} style={{ width: '100%', height: `${height}px`, display: 'block' }} />;
}

// ============================================================================
// MAIN APP
// ============================================================================
function App() {
  const [angles, setAngles] = useState({ b: 0, s: 50, e: 90 });
  const [tipFromFW, setTipFromFW] = useState(null);
  const [wrist, setWrist] = useState({ r: 90, p: 120 });
  // Joint offsets (deg). Mirrors firmware state. Updated from telemetry+[cal] lines.
  // UI never sets these directly except as initial value before first sync from arm.
  const [jointOffsets, setJointOffsets] = useState({ b: 0, s: -17, e: 0 });
  const [calSavedHint, setCalSavedHint] = useState(0); // bumps on save
  const [mode, setMode] = useState('MANUAL');
  const [speed, setSpeed] = useState(40);
  const [pulseMs, setPulseMs] = useState(500);
  const [stepIn, setStepIn] = useState(1);
  const [loop, setLoop] = useState(false);
  const [imuQuat, setImuQuat] = useState({ w: 1, x: 0, y: 0, z: 0 });
  const [imuReady, setImuReady] = useState(false);
  const [tab, setTab] = useState('view'); // view | graphs | catch | controller
  const [viewMode, setViewMode] = useState('single'); // single | multi
  const [showWorkspace, setShowWorkspace] = useState(false);
  const [activeDance, setActiveDance] = useState(0);
  const [streamOn, setStreamOn] = useState(true);
  const [gamepadEnabled, setGamepadEnabled] = useState(false);
  const [gamepadJointMode, setGamepadJointMode] = useState(false);
  const [gamepadInfo, setGamepadInfo] = useState(null);

  // graphs / history
  const histRef = useRef({ angles: [], pwm: [], tip: [] });
  const tickHist = useCallback((a, t) => {
    const now = Date.now();
    const h = histRef.current;
    h.angles.push({ t: now, b: a.b, s: a.s, e: a.e });
    if (t) h.tip.push({ t: now, x: t.x, y: t.y, z: t.z });
    // trim to 30s
    const cutoff = now - 30000;
    h.angles = h.angles.filter(p => p.t > cutoff);
    h.tip = h.tip.filter(p => p.t > cutoff);
  }, []);

  const [targetXYZ, setTargetXYZ] = useState(null);
  const [catchPath, setCatchPath] = useState(null);
  const [catchSimRunning, setCatchSimRunning] = useState(false);

  // terminal
  const [lines, setLines] = useState([
    { t: 'sys', s: 'ARM-01 GROUND CONTROL · v3' },
    { t: 'sys', s: 'STANDBY · awaiting link' },
  ]);
  const termRef = useRef(null);
  const [cmdInput, setCmdInput] = useState('');

  const addLine = useCallback((s, tag = 'rx') => {
    setLines((p) => {
      const n = [...p, { t: tag, s }];
      return n.slice(-400);
    });
  }, []);

  // Telemetry parser
  const onTelemetry = useCallback((line) => {
    // v2 format: $T,b,s,e,x,y,z,roll,pitch,mode,qw,qx,qy,qz
    // v3 format: ...,bOff,sOff,eOff       (3 extra fields at end)
    const parts = line.slice(3).split(',');
    if (parts.length < 13) return;
    const a = { b: +parts[0], s: +parts[1], e: +parts[2] };
    const t = { x: +parts[3], y: +parts[4], z: +parts[5] };
    setAngles(a);
    setTipFromFW(t);
    setWrist({ r: +parts[6], p: +parts[7] });
    const m = parseInt(parts[8]);
    if (!isNaN(m) && m >= 0 && m < MODE_NAMES.length) setMode(MODE_NAMES[m]);
    setImuQuat({ w: +parts[9], x: +parts[10], y: +parts[11], z: +parts[12] });
    setImuReady(!(+parts[9] === 1 && +parts[10] === 0 && +parts[11] === 0 && +parts[12] === 0));
    // v3: joint offsets carried in telemetry so UI is always in sync
    if (parts.length >= 16) {
      const bOff = +parts[13], sOff = +parts[14], eOff = +parts[15];
      if (isFinite(bOff) && isFinite(sOff) && isFinite(eOff)) {
        setJointOffsets((prev) => {
          if (prev.b === bOff && prev.s === sOff && prev.e === eOff) return prev;
          return { b: bOff, s: sOff, e: eOff };
        });
      }
    }
    tickHist(a, t);
  }, [tickHist]);

  const onSerialLine = useCallback((line) => {
    addLine(line, 'rx');
    // also parse mode/setting changes from human-readable lines
    let m;
    if ((m = line.match(/^>>\s*(\w+)/))) setMode(m[1]);
    if ((m = line.match(/^speed=(\d+)/))) setSpeed(+m[1]);
    if ((m = line.match(/^pulseMs=(\d+)/))) setPulseMs(+m[1]);
    if ((m = line.match(/^stepIn=([\d.]+)/))) setStepIn(+m[1]);
    if ((m = line.match(/^loop=(on|off)/))) setLoop(m[1] === 'on');
    if ((m = line.match(/^telemetry=(on|off)/))) setStreamOn(m[1] === 'on');
    if ((m = line.match(/^IMU:\s*(\w+)/))) setImuReady(m[1] === 'online');
    // [cal] B=0.00 S=17.00 E=0.00
    if ((m = line.match(/\[cal\]\s+B=(-?[\d.]+)\s+S=(-?[\d.]+)\s+E=(-?[\d.]+)/))) {
      setJointOffsets({ b: +m[1], s: +m[2], e: +m[3] });
    }
    if (line.includes('[cal] saved to EEPROM')) setCalSavedHint(t => t + 1);
    if ((m = line.match(/^\[dance\] selected: (\w+)/))) {
      const idx = DANCE_NAMES.indexOf(m[1]);
      if (idx >= 0) setActiveDance(idx);
    }
  }, [addLine]);

  const { connected, error, connect, disconnect, send } = useSerial({
    onLine: onSerialLine,
    onTelemetry,
  });

  // ============================================================================
  // CAM TRACKING STATE
  // ============================================================================
  const [showCamFov, setShowCamFov] = useState(false);
  const [dronePos, setDronePos] = useState(null);          // world XYZ in inches (smoothed)
  const [camRawXYZ, setCamRawXYZ] = useState(null);        // raw cam-frame mm for display
  const [camFps, setCamFps] = useState(0);
  const [camLastSeen, setCamLastSeen] = useState(0);
  const [camLostStreak, setCamLostStreak] = useState(0);
  const [camLastRawLine, setCamLastRawLine] = useState('');

  // Cam orientation tunables (user adjusts to match physical sensor mount)
  const [camRotation, setCamRotation] = useState(0);   // 0 / 90 / 180 / 270
  const [camFlipH, setCamFlipH]       = useState(true); // default to my prior implicit
  const [camFlipV, setCamFlipV]       = useState(false);
  const [camZOffset, setCamZOffset]   = useState(0);   // inches, fudge factor for height
  const [smoothAlpha, setSmoothAlpha] = useState(0.35); // EMA: 0=none, 1=infinite smoothing
  const camOrientRef = useRef({ rotation: 0, flipH: true, flipV: false, zOffset: 0, alpha: 0.35 });
  useEffect(() => {
    camOrientRef.current = { rotation: camRotation, flipH: camFlipH, flipV: camFlipV, zOffset: camZOffset, alpha: smoothAlpha };
  }, [camRotation, camFlipH, camFlipV, camZOffset, smoothAlpha]);

  const smoothedRef = useRef(null); // last smoothed world pos
  const droneTrailRef = useRef([]);
  const camFrameCountRef = useRef({ count: 0, since: Date.now() });

  // Mini-terminal log for cam debugging (separate from main terminal so the cam
  // panel has its own scrollable view). Stored in a ref to avoid re-rendering
  // on every line, with a tick counter to trigger renders at most ~10Hz.
  const camLogRef = useRef([]);   // [{ts, kind: 'rx'|'tx'|'sys', text}]
  const [camLogTick, setCamLogTick] = useState(0);
  const camTickThrottleRef = useRef(0);
  const pushCamLog = useCallback((text, kind = 'rx') => {
    const log = camLogRef.current;
    log.push({ ts: Date.now(), kind, text });
    while (log.length > 200) log.shift();
    const now = Date.now();
    if (now - camTickThrottleRef.current >= 100) {
      camTickThrottleRef.current = now;
      setCamLogTick(t => t + 1);
    }
  }, []);
  const [camRxBytes, setCamRxBytes] = useState(0);

  // Parser for cam serial lines. Cam output format:
  //   FOUND  XYZ=(   -3.5,    10.2,   425.8) mm  area=  842  px=( 158.4,  121.7)  fps=12.3
  //   LOST   area=...
  // Anything else (boot banner, OK responses) gets pushed to terminal.
  // Regex is permissive: accepts any whitespace between numbers, optional inf/nan,
  // and tolerates extra junk after the closing paren.
  const reFound = /FOUND[^()]*\(\s*(-?\d+(?:\.\d+)?|-?inf|nan)\s*,\s*(-?\d+(?:\.\d+)?|-?inf|nan)\s*,\s*(-?\d+(?:\.\d+)?|-?inf|nan)\s*\)/i;
  const reLost  = /^LOST\b/i;
  const onCamLine = useCallback((line) => {
    // Track every raw line for the diag display + cam log
    setCamLastRawLine(line);
    pushCamLog(line, 'rx');

    // Bookkeeping fps even on lost frames
    const fc = camFrameCountRef.current;
    fc.count++;
    const now = Date.now();
    if (now - fc.since >= 1000) {
      setCamFps(fc.count * 1000 / (now - fc.since));
      fc.count = 0; fc.since = now;
    }

    const m = line.match(reFound);
    if (m) {
      const cx_mm = parseFloat(m[1]);
      const cy_mm = parseFloat(m[2]);
      const cz_mm = parseFloat(m[3]);
      if (!isFinite(cx_mm) || !isFinite(cy_mm) || !isFinite(cz_mm)) {
        addLine(`[CAM] !inf/nan in: ${line}`, 'err');
        return;
      }
      const cx_in = cx_mm * MM_TO_IN;
      const cy_in = cy_mm * MM_TO_IN;
      const cz_in = cz_mm * MM_TO_IN;
      const orient = camOrientRef.current;
      const w = camFrameToWorld(cx_in, cy_in, cz_in, orient);

      // EMA smoothing. alpha = how heavily to weight previous value.
      // smoothed = prev * alpha + new * (1 - alpha)
      // alpha 0 = pass-through raw, alpha 1 = stuck on first sample.
      const alpha = orient.alpha;
      let smoothed;
      const prev = smoothedRef.current;
      if (!prev || alpha <= 0) {
        smoothed = w;
      } else {
        smoothed = {
          x: prev.x * alpha + w.x * (1 - alpha),
          y: prev.y * alpha + w.y * (1 - alpha),
          z: prev.z * alpha + w.z * (1 - alpha),
        };
      }
      smoothedRef.current = smoothed;

      const now2 = Date.now();
      setDronePos(smoothed);
      setCamRawXYZ({ x: cx_mm, y: cy_mm, z: cz_mm });
      setCamLastSeen(now2);
      setCamLostStreak(0);
      const trail = droneTrailRef.current;
      trail.push({ ...smoothed, t: now2 });
      const cutoff = now2 - TRAIL_MAX_AGE_MS;
      while (trail.length > 0 && trail[0].t < cutoff) trail.shift();
      while (trail.length > TRAIL_MAX) trail.shift();
      return;
    }
    if (reLost.test(line)) {
      setCamLostStreak((s) => {
        const next = s + 1;
        if (next >= 5) { setDronePos(null); smoothedRef.current = null; }
        return next;
      });
      return;
    }
    // Anything that isn't FOUND/LOST: dump to terminal so we can see what cam sends
    addLine(`[CAM] ${line}`, 'rx');
  }, [addLine]);

  // Watches raw bytes flowing in (before line splitting). Useful when the cam
  // sends partial data with no \n - we can still see something is alive.
  const onCamRaw = useCallback((chunk) => {
    setCamRxBytes(b => b + chunk.length);
    // If a chunk has no newline at all but we keep getting data, log it as a
    // partial after a beat so we don't sit forever waiting for \n
    // (handled by buffer in useSerial; this is just for the byte counter)
  }, []);

  const cam = useSerial({
    onLine: onCamLine,
    onTelemetry: () => {}, // no $T from cam
    onRaw: onCamRaw,
    resetOnOpen: true,     // pulse DTR to wake up ESP32 from reset/bootloader
  });

  useEffect(() => {
    if (termRef.current) termRef.current.scrollTop = termRef.current.scrollHeight;
  }, [lines]);

  // Sim tick when not connected
  const [simTarget, setSimTarget] = useState(null);
  useEffect(() => {
    if (connected) return;
    let raf;
    const step = () => {
      if (simTarget) {
        setAngles((cur) => {
          const next = { ...cur };
          for (const k of ['b', 's', 'e']) {
            const err = simTarget[k] - cur[k];
            if (Math.abs(err) < 0.4) next[k] = simTarget[k];
            else next[k] = cur[k] + Math.sign(err) * Math.min(2.5, Math.abs(err));
          }
          return next;
        });
      }
      raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [connected, simTarget]);

  // History ticker for graphs even when not getting telemetry
  useEffect(() => {
    if (connected) return;
    const id = setInterval(() => {
      const t = fk(angles.b, angles.s, angles.e);
      tickHist(angles, t);
    }, 100);
    return () => clearInterval(id);
  }, [connected, angles, tickHist]);

  const fkTip = useMemo(() => fk(angles.b, angles.s, angles.e), [angles]);
  const tip = tipFromFW || fkTip;

  // Send wrappers
  const sendChar = useCallback((c) => {
    if (connected) { send(c); addLine(`> ${c}`, 'tx'); }
    else { addLine(`(sim) > ${c}`, 'tx'); handleSimChar(c); }
  }, [connected, send, addLine]);

  const sendLine = useCallback((s) => {
    if (connected) { send(s + '\n'); addLine(`> ${s}`, 'tx'); }
    else { addLine(`(sim) > ${s}`, 'tx'); handleSimLine(s); }
  }, [connected, send, addLine]);

  function handleSimChar(c) {
    if ('MDHKBT'.includes(c)) {
      const map = { M:'MANUAL', D:'DANCE', H:'HEIGHT', K:'XYZ', B:'DEBUG', T:'TILT' };
      setMode(map[c]);
    }
    else if (c === '+') setSpeed((v) => Math.min(255, v + 10));
    else if (c === '-') setSpeed((v) => Math.max(10, v - 10));
    else if (c === 'L') setLoop((v) => !v);
    else if (c === 'S') setStreamOn((v) => !v);
    else if (c === '6') setSimTarget({ b: 0, s: 50, e: 90 });
    else if (c === '7') setSimTarget({ b: 0, s: -40, e: 30 });
    else if (c === '8') { const r = ik(10,0,25); if (r.ok) setSimTarget({b:r.b,s:r.s,e:r.e}); }
    else if (c === '9') { const r = ik(14,0,20); if (r.ok) setSimTarget({b:r.b,s:r.s,e:r.e}); }
    else if (c === '0') setSimTarget({ b: 0, s: 60, e: 110 });
    else if (c === 'X') setSimTarget(null);
  }
  function handleSimLine(s) {
    let m;
    if ((m = s.match(/^c\s+([-\d.]+)\s+([-\d.]+)\s+([-\d.]+)/))) {
      const r = ik(+m[1], +m[2], +m[3]);
      if (r.ok) setSimTarget({ b: r.b, s: r.s, e: r.e });
    }
    if ((m = s.match(/^dn\s+(\d)/))) setActiveDance(+m[1]);
    // sim cal: just update local state so the UI feels responsive when offline
    if ((m = s.match(/^cal\s+([bse])\s+(-?[\d.]+)/))) {
      const v = +m[2];
      setJointOffsets(prev => ({ ...prev, [m[1]]: v }));
    }
    if (s === 'cal reset') setJointOffsets({ b: 0, s: 0, e: 0 });
  }

  // CAL helpers — issue commands to firmware (or sim) and let the response
  // sync UI state via the [cal] line parser above.
  const calSet = useCallback((axis, deg) => {
    const v = Math.max(-90, Math.min(90, +deg.toFixed(2)));
    sendLine(`cal ${axis} ${v}`);
  }, [sendLine]);
  const calNudge = useCallback((axis, delta) => {
    const cur = jointOffsets[axis];
    calSet(axis, cur + delta);
  }, [jointOffsets, calSet]);
  const calSave  = useCallback(() => sendLine('cal save'),  [sendLine]);
  const calLoad  = useCallback(() => sendLine('cal load'),  [sendLine]);
  const calReset = useCallback(() => sendLine('cal reset'), [sendLine]);
  const calQuery = useCallback(() => sendLine('cal'),       [sendLine]);

  // Auto-fetch offsets shortly after the Teensy connects so the UI is in sync
  // before the first telemetry frame arrives.
  useEffect(() => {
    if (!connected) return;
    const timer = setTimeout(() => { send('cal\n').catch(() => {}); }, 250);
    return () => clearTimeout(timer);
  }, [connected, send]);

  const commitTarget = useCallback((xyz) => {
    const r = ik(xyz.x, xyz.y, xyz.z);
    if (!r.ok) {
      addLine(`✖ IK: ${r.err}`, 'err');
      setTargetXYZ(null);
      return;
    }
    sendLine(`c ${xyz.x.toFixed(2)} ${xyz.y.toFixed(2)} ${xyz.z.toFixed(2)}`);
    setTimeout(() => setTargetXYZ(null), 350);
  }, [addLine, sendLine]);

  const eStop = () => { sendChar('X'); setTargetXYZ(null); setSimTarget(null); setCatchSimRunning(false); };

  // ============================================================================
  // CATCH SEQUENCE — drives the arm to approach-from-below, then up to drone,
  // then sets wrist to flat-upright. Works in sim AND with real firmware
  // (sendLine handles both modes).
  //
  // Wrist commands assumed: `wr <deg>` and `wp <deg>` (0-180, 90 = neutral).
  // If your firmware uses different commands, change them in catchDrone().
  // ============================================================================
  const catchTimerRef = useRef(null);
  const [catchPhase, setCatchPhase] = useState(null); // 'approach' | 'grab' | null

  const catchDrone = useCallback(() => {
    if (!dronePos) {
      addLine('✖ CATCH: no drone in view', 'err');
      return;
    }
    const APPROACH_BELOW = 5.0; // inches
    const approach = { x: dronePos.x, y: dronePos.y, z: Math.max(Z_FLOOR + 0.5, dronePos.z - APPROACH_BELOW) };
    const grab     = { x: dronePos.x, y: dronePos.y, z: dronePos.z };

    // Validate both poses reach
    const ra = ik(approach.x, approach.y, approach.z);
    if (!ra.ok) { addLine(`✖ CATCH approach IK: ${ra.err}`, 'err'); return; }
    const rg = ik(grab.x, grab.y, grab.z);
    if (!rg.ok) { addLine(`✖ CATCH grab IK: ${rg.err}`, 'err'); return; }

    addLine(`▶ CATCH start  approach=(${approach.x.toFixed(1)}, ${approach.y.toFixed(1)}, ${approach.z.toFixed(1)})  grab=(${grab.x.toFixed(1)}, ${grab.y.toFixed(1)}, ${grab.z.toFixed(1)})`, 'sys');

    // Show the catch path in the scene
    setCatchPath([approach, grab]);

    // Phase 1: pre-set wrist to flat upright BEFORE moving (so it's level on arrival)
    // Magnet hangs off the very end of the wrist, past both servos. To present the
    // face horizontally pointing UP at the drone, use the firmware's calibrated
    // level values: ROLL_LEVEL=90, PITCH_LEVEL=120 (per arm_main_v3.ino).
    // Uppercase WR/WP because lowercase 'w' is a manual-mode jog key.
    sendLine('WR 90');    // wrist roll neutral
    sendLine('WP 120');   // wrist pitch level — magnet face horizontal, pointing up

    // Phase 2: move to approach pose (5" below drone)
    setCatchPhase('approach');
    setTargetXYZ(approach);
    sendLine(`c ${approach.x.toFixed(2)} ${approach.y.toFixed(2)} ${approach.z.toFixed(2)}`);

    if (catchTimerRef.current) clearTimeout(catchTimerRef.current);

    // Phase 3: after a beat, move up to grab pose
    catchTimerRef.current = setTimeout(() => {
      setCatchPhase('grab');
      setTargetXYZ(grab);
      sendLine(`c ${grab.x.toFixed(2)} ${grab.y.toFixed(2)} ${grab.z.toFixed(2)}`);
      addLine(`▶ CATCH grab pose committed`, 'sys');

      // Phase 4: clear path + phase after settle time
      catchTimerRef.current = setTimeout(() => {
        setCatchPhase(null);
        setCatchPath(null);
      }, 2500);
    }, 1500);
  }, [dronePos, addLine, sendLine, setTargetXYZ, setCatchPath]);

  const catchAbort = useCallback(() => {
    if (catchTimerRef.current) clearTimeout(catchTimerRef.current);
    catchTimerRef.current = null;
    setCatchPhase(null);
    setCatchPath(null);
    setTargetXYZ(null);
    addLine('CATCH aborted', 'sys');
  }, [addLine]);

  useEffect(() => () => { if (catchTimerRef.current) clearTimeout(catchTimerRef.current); }, []);

  // Esc clears
  useEffect(() => {
    const onK = (e) => { if (e.key === 'Escape') setTargetXYZ(null); };
    window.addEventListener('keydown', onK);
    return () => window.removeEventListener('keydown', onK);
  }, []);

  // ============================================================================
  // (Old keyboard hold-to-jog removed: it was sending `j <axis> <speed>` lines
  // that the v3 firmware doesn't parse, and the watchdog only protected the
  // jog system - so stuck keys could keep firing. The manual-mode keys 1/q/2/w
  // etc. still work via the existing browser default keypress -> sendChar
  // path or the on-screen HOLD buttons.)
  // ============================================================================

  // Gamepad: button mapping
  // Standard layout (Xbox):
  //   0=A 1=B 2=X 3=Y 4=LB 5=RB 6=LT 7=RT 8=Back 9=Start 10=LStick 11=RStick
  //   12=DUp 13=DDown 14=DLeft 15=DRight
  const gamepadAction = useCallback((evt) => {
    if (evt.type === 'btn') {
      const i = evt.i;
      // A = e-stop
      if (i === 0) eStop();
      // X = greet (dance 1)
      else if (i === 2) { sendLine('dn 1'); setTimeout(() => { sendChar('D'); sendChar('G'); }, 100); }
      // B = idle (dance 2)
      else if (i === 1) { sendLine('dn 2'); setTimeout(() => { sendChar('D'); sendChar('G'); }, 100); }
      // Y = showcase (dance 0)
      else if (i === 3) { sendLine('dn 0'); setTimeout(() => { sendChar('D'); sendChar('G'); }, 100); }
      // LB/RB = combat / chase
      else if (i === 4) { sendLine('dn 3'); setTimeout(() => { sendChar('D'); sendChar('G'); }, 100); }
      else if (i === 5) { sendLine('dn 4'); setTimeout(() => { sendChar('D'); sendChar('G'); }, 100); }
      // D-pad up/down = speed
      else if (i === 12) sendChar('+');
      else if (i === 13) sendChar('-');
      // D-pad left = home (pose 6), D-pad right = extended (pose 9)
      else if (i === 14) sendChar('6');
      else if (i === 15) sendChar('9');
      // Start = e-stop too
      else if (i === 9) eStop();
      // Back = toggle joint mode
      else if (i === 8) setGamepadJointMode((v) => !v);
    } else if (evt.type === 'axes') {
      const ax = evt.axes;
      const btns = evt.buttons;
      const THRESHOLD = 0.45;  // stick must cross this for a jog to fire
      const HOLD_REPEAT_MS = 220;  // when held past threshold, repeat at this rate

      // Persistent state across axis ticks (lives on the function)
      // We need to remember which axes are currently "engaged" and when we
      // last fired, so we can debounce.
      if (!evt._gpState) evt._gpState = {}; // placeholder
      // Use refs via closure on the outer hook. Instead, store on window.
      if (!window.__gpAxisState) {
        window.__gpAxisState = {};  // { axis_name: { engaged: bool, lastFireMs: number } }
      }
      const st = window.__gpAxisState;
      const now = performance.now();

      // Helper: given a logical axis name and a signed value, fire a single
      // sendChar event when value crosses threshold or every HOLD_REPEAT_MS
      // while held past threshold. Returns true if fired.
      const handle = (key, value, posChar, negChar) => {
        const above = value > THRESHOLD;
        const below = value < -THRESHOLD;
        const inside = !above && !below;
        const s = st[key] || { engaged: 0, lastFireMs: 0 };
        if (inside) {
          // released - clear state, no fire
          st[key] = { engaged: 0, lastFireMs: 0 };
          return false;
        }
        const dir = above ? 1 : -1;
        // First crossing: fire once
        if (s.engaged !== dir) {
          st[key] = { engaged: dir, lastFireMs: now };
          if (above && posChar) sendChar(posChar);
          else if (below && negChar) sendChar(negChar);
          return true;
        }
        // Held: repeat at HOLD_REPEAT_MS
        if (now - s.lastFireMs >= HOLD_REPEAT_MS) {
          st[key].lastFireMs = now;
          if (above && posChar) sendChar(posChar);
          else if (below && negChar) sendChar(negChar);
          return true;
        }
        return false;
      };

      if (gamepadJointMode) {
        // Joint mode: LX = base, LY = shoulder, RY = elbow
        // Map to existing pulse-jog letters (one pulse = ~3deg on motor, repeat
        // smoothly while held).
        handle('base',  ax[0],  '1', 'q');
        handle('shld', -ax[1],  '2', 'w');
        handle('elbw', -ax[3],  '3', 'e');
      } else {
        // XYZ mode: stream a moving target instead of pulsing nudge keys.
        // Each c X Y Z command overwrites the firmware's target, so the IK
        // tracks a smoothly moving goalpost (way less jerky than discrete
        // w/a/s/d nudges that each kick off a separate synced move).
        if (mode !== 'XYZ') {
          window.__gpAxisState = {};
          return;
        }
        const dz = 0.18;
        const analog = (a) => {
          if (Math.abs(a) < dz) return 0;
          const sign = a > 0 ? 1 : -1;
          return sign * (Math.abs(a) - dz) / (1 - dz);  // -1..1 outside deadzone
        };
        const lt = btns?.[6] || 0;
        const rt = btns?.[7] || 0;
        // Velocity in inches/sec at full stick. Smaller = finer control.
        const VEL = 6.0;
        // Time since last update (track on window object since useCallback closure)
        if (!window.__gpXyzClock) window.__gpXyzClock = { lastMs: 0, lastSentMs: 0 };
        const clk = window.__gpXyzClock;
        const dt = clk.lastMs ? Math.min(0.1, (now - clk.lastMs) / 1000) : 0;
        clk.lastMs = now;
        // Velocity from stick (cubic curve = finer at low end)
        const vXraw = analog(-ax[1]);
        const vYraw = analog(-ax[0]);
        const vZraw = (rt > 0.3 ? rt : 0) - (lt > 0.3 ? lt : 0);
        const cubic = (n) => Math.sign(n) * Math.pow(Math.abs(n), 2.0);
        const vx = cubic(vXraw) * VEL;
        const vy = cubic(vYraw) * VEL;
        const vz = cubic(vZraw) * VEL;
        if (vx === 0 && vy === 0 && vz === 0) {
          // stick centered — release the target so any drag-ghost clears
          if (clk.lastSentMs && now - clk.lastSentMs > 200) {
            clk.lastSentMs = 0;
          }
          return;
        }
        // Throttle to ~30Hz
        if (now - clk.lastSentMs < 33) return;
        clk.lastSentMs = now;
        // Compute new target by integrating velocity over dt from current tip
        const nx = (tip?.x ?? 0) + vx * dt;
        const ny = (tip?.y ?? 0) + vy * dt;
        const nz = (tip?.z ?? 0) + vz * dt;
        sendLine(`c ${nx.toFixed(2)} ${ny.toFixed(2)} ${nz.toFixed(2)}`);
      }
    }
  }, [sendChar, sendLine, gamepadJointMode, mode, tip]);

  useGamepad({ enabled: gamepadEnabled, onAction: gamepadAction });

  // detect connected gamepad to display name
  useEffect(() => {
    const check = () => {
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      const p = pads[0];
      if (p) setGamepadInfo({ id: p.id });
      else setGamepadInfo(null);
    };
    window.addEventListener('gamepadconnected', check);
    window.addEventListener('gamepaddisconnected', check);
    check();
    const id = setInterval(check, 1500);
    return () => {
      window.removeEventListener('gamepadconnected', check);
      window.removeEventListener('gamepaddisconnected', check);
      clearInterval(id);
    };
  }, []);

  // CATCH SIM
  const catchSimRef = useRef({});
  useEffect(() => {
    if (!catchSimRunning) { setCatchPath(null); return; }
    const start = performance.now();
    let raf;
    const path = [];
    const step = () => {
      const t = (performance.now() - start) / 1000;
      // Drone trajectory: parabolic falling toward arm
      const x = 25 - t * 12;
      const y = -8 + Math.sin(t * 1.3) * 3;
      const z = 30 - t * t * 4;
      const pt = { x, y, z };
      path.push(pt);
      if (path.length > 50) path.shift();
      setCatchPath([...path]);
      // command arm if reachable
      if (z > 5 && z < REACH + SHLD_OFF) {
        const r = ik(x, y, z);
        if (r.ok && !connected) setSimTarget({ b: r.b, s: r.s, e: r.e });
      }
      // stop after 3s
      if (t > 3.5) { setCatchSimRunning(false); return; }
      raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [catchSimRunning, connected]);

  return (
    <div style={{
      width: '100%', height: '100%',
      display: 'grid',
      gridTemplateRows: '64px 38px 1fr 200px',
    }}>
      <TopBar
        connected={connected}
        mode={mode}
        imuReady={imuReady}
        error={error}
        speed={speed}
        streamOn={streamOn}
        onConnect={connect}
        onDisconnect={disconnect}
        onEStop={eStop}
        onToggleStream={() => sendChar('S')}
        hasSerial={'serial' in navigator}
      />

      {/* TAB STRIP */}
      <div style={{ display: 'flex', borderBottom: '1px solid var(--ink)', background: 'var(--paper)' }}>
        {[
          { id: 'view', label: '01 / VIEWPORT' },
          { id: 'graphs', label: '02 / GRAPHS' },
          { id: 'catch', label: '03 / CATCH SIM' },
          { id: 'controller', label: '04 / CONTROLLER' },
        ].map((t) => (
          <button
            key={t.id}
            className={`tab ${tab === t.id ? 'active' : ''}`}
            onClick={() => setTab(t.id)}
          >{t.label}</button>
        ))}
        <div style={{ flex: 1, borderRight: '1px solid var(--ink)' }} />
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '0 14px', borderRight: '1px solid var(--ink)' }}>
          <span className="label">VIEW MODE</span>
          <button onClick={() => setViewMode((v) => v === 'single' ? 'multi' : 'single')}
            style={{ padding: '4px 10px', fontSize: 10 }}>
            {viewMode === 'single' ? 'SINGLE' : 'MULTI'}
          </button>
          <button onClick={() => setShowWorkspace((v) => !v)}
            className={showWorkspace ? 'active' : ''}
            style={{ padding: '4px 10px', fontSize: 10 }}>
            WS {showWorkspace ? 'ON' : 'OFF'}
          </button>
        </div>
      </div>

      {/* MAIN AREA */}
      <div style={{
        display: 'grid',
        gridTemplateColumns: '300px 1fr 340px',
        gap: 0,
        minHeight: 0,
        borderBottom: '1px solid var(--ink)',
      }}>
        <LeftPanel
          speed={speed} setSpeed={setSpeed}
          pulseMs={pulseMs} setPulseMs={setPulseMs}
          stepIn={stepIn} setStepIn={setStepIn}
          sendChar={sendChar} sendLine={sendLine}
          angles={angles} tip={tip} wrist={wrist}
          imuQuat={imuQuat} imuReady={imuReady}
          calProps={{
            offsets: jointOffsets,
            connected: connected,
            savedHint: calSavedHint,
            nudge: calNudge,
            set: calSet,
            save: calSave,
            load: calLoad,
            reset: calReset,
            query: calQuery,
          }}
          camProps={{
            connected: cam.connected,
            error: cam.error,
            connect: cam.connect,
            disconnect: cam.disconnect,
            fps: camFps,
            lastSeen: camLastSeen,
            dronePos: dronePos,
            rawXYZ: camRawXYZ,
            showFov: showCamFov,
            setShowFov: setShowCamFov,
            clearTrail: () => { droneTrailRef.current = []; setDronePos(null); },
            catchDrone: catchDrone,
            catchAbort: catchAbort,
            catchPhase: catchPhase,
            lastRawLine: camLastRawLine,
            log: camLogRef.current,
            logTick: camLogTick,
            rxBytes: camRxBytes,
            send: async (s) => { pushCamLog(s, 'tx'); return cam.send(s + '\n'); },
            sendChar: async (c) => { pushCamLog(c, 'tx'); return cam.send(c); },
            resetEsp: async () => { pushCamLog('--- DTR reset pulse ---', 'sys'); return cam.pulseReset(); },
            releaseSignals: async () => { pushCamLog('--- release DTR/RTS ---', 'sys'); return cam.releaseSignals(); },
            clearLog: () => { camLogRef.current = []; setCamLogTick(t => t + 1); setCamRxBytes(0); },
            // Orientation + smoothing
            rotation: camRotation,    setRotation: setCamRotation,
            flipH: camFlipH,          setFlipH: setCamFlipH,
            flipV: camFlipV,          setFlipV: setCamFlipV,
            zOffset: camZOffset,      setZOffset: setCamZOffset,
            smoothAlpha: smoothAlpha, setSmoothAlpha: setSmoothAlpha,
          }}
        />

        <div style={{ borderLeft: '1px solid var(--ink)', borderRight: '1px solid var(--ink)', minWidth: 0, position: 'relative' }}>
          {tab === 'view' && (
            <CenterView
              angles={angles}
              targetXYZ={targetXYZ}
              setTargetXYZ={setTargetXYZ}
              onCommit={commitTarget}
              tip={tip}
              viewMode={viewMode}
              showWorkspace={showWorkspace}
              catchPath={catchPath}
              dronePos={dronePos}
              droneTrail={droneTrailRef.current}
              showCamFov={showCamFov}
              camStatus={{ connected: cam.connected, fps: camFps, lastSeen: camLastSeen, raw: camRawXYZ, error: cam.error, catchDrone, catchAbort, catchPhase }}
            />
          )}
          {tab === 'graphs' && <GraphsTab histRef={histRef} angles={angles} tip={tip} sendLine={sendLine} setTargetXYZ={setTargetXYZ} />}
          {tab === 'catch' && (
            <CatchSimTab
              running={catchSimRunning}
              setRunning={setCatchSimRunning}
              angles={angles}
              targetXYZ={targetXYZ}
              setTargetXYZ={setTargetXYZ}
              onCommit={commitTarget}
              tip={tip}
              viewMode={viewMode}
              showWorkspace={showWorkspace}
              catchPath={catchPath}
              dronePos={dronePos}
              droneTrail={droneTrailRef.current}
              showCamFov={showCamFov}
            />
          )}
          {tab === 'controller' && (
            <ControllerTab
              enabled={gamepadEnabled}
              setEnabled={setGamepadEnabled}
              info={gamepadInfo}
              jointMode={gamepadJointMode}
              setJointMode={setGamepadJointMode}
            />
          )}
        </div>

        <RightPanel
          mode={mode}
          sendChar={sendChar} sendLine={sendLine}
          setMode={setMode}
          speed={speed}
          activeDance={activeDance}
          setActiveDance={(i) => { setActiveDance(i); sendLine(`dn ${i}`); }}
          loop={loop}
          fkTip={tip}
          imuReady={imuReady}
          targetXYZ={targetXYZ}
          setTargetXYZ={setTargetXYZ}
        />
      </div>

      {/* TERMINAL */}
      <Terminal
        lines={lines}
        termRef={termRef}
        cmdInput={cmdInput}
        setCmdInput={setCmdInput}
        onSubmit={(s) => { sendLine(s); setCmdInput(''); }}
        streamOn={streamOn}
      />
    </div>
  );
}

// ============================================================================
// TOP BAR
// ============================================================================
function TopBar({ connected, mode, imuReady, error, speed, streamOn, onConnect, onDisconnect, onEStop, onToggleStream, hasSerial }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'stretch',
      borderBottom: '1px solid var(--ink)',
      background: 'var(--paper)',
      position: 'relative',
    }}>
      {/* Brand block */}
      <div style={{
        background: 'var(--ink)', color: 'var(--paper)',
        padding: '0 18px', display: 'flex', alignItems: 'center', gap: 14,
        borderRight: '1px solid var(--ink)',
      }}>
        <div style={{ width: 18, height: 18, background: 'var(--hazard)' }} />
        <div>
          <div className="display" style={{ fontSize: 16, lineHeight: 1, letterSpacing: '0.02em' }}>ARM-01</div>
          <div className="mono" style={{ fontSize: 9, color: 'var(--grey-2)', marginTop: 2, letterSpacing: '0.16em' }}>
            GROUND CONTROL · v3
          </div>
        </div>
      </div>

      {/* status line */}

        }}>

        </div>
      )}
    </div>
  );

// ============================================================================
// IMU ATTITUDE GAUGE (artificial horizon style)
// ============================================================================
function ImuGauge({ q, ready }) {
  // Compute roll/pitch/yaw from quaternion
  const { roll, pitch, yaw } = useMemo(() => {
    const { w, x, y, z } = q;
    const sinr = 2 * (w*x + y*z);
    const cosr = 1 - 2 * (x*x + y*y);
    const r = Math.atan2(sinr, cosr);
    let sinp = 2 * (w*y - z*x);
    if (sinp > 1) sinp = 1;
    if (sinp < -1) sinp = -1;
    const p = Math.asin(sinp);
    const siny = 2 * (w*z + x*y);
    const cosy = 1 - 2 * (y*y + z*z);
    const yawA = Math.atan2(siny, cosy);
    return { roll: r * 180 / Math.PI, pitch: p * 180 / Math.PI, yaw: yawA * 180 / Math.PI };
  }, [q]);

  const size = 100;
  const horY = pitch * 1.2; // pixels per degree-ish
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
      <div style={{
        width: size, height: size, position: 'relative',
        border: '1px solid var(--ink)', overflow: 'hidden', background: '#fff',
      }}>
        {/* horizon */}
        <div style={{
          position: 'absolute', left: -20, right: -20, top: '50%',
          height: 200, transformOrigin: 'center',
          transform: `translateY(${horY}px) rotate(${-roll}deg) translateY(-50%)`,
          background: 'linear-gradient(to bottom, #c8d8ee 0%, #c8d8ee 50%, #b59670 50%, #b59670 100%)',
        }}>
          <div style={{ position: 'absolute', left: 0, right: 0, top: '50%', height: 1, background: 'var(--ink)' }} />
        </div>
        {/* center bug */}
        <div style={{
          position: 'absolute', left: '50%', top: '50%', width: 30, height: 1,
          background: 'var(--hazard)', transform: 'translate(-50%, -50%)',
        }} />
        <div style={{
          position: 'absolute', left: '50%', top: '50%', width: 1, height: 8,
          background: 'var(--hazard)', transform: 'translate(-50%, -50%)',
        }} />
        {!ready && (
          <div style={{
            position: 'absolute', inset: 0,
            background: 'repeating-linear-gradient(45deg, rgba(154,154,154,0.5) 0 5px, transparent 5px 10px)',
          }} />
        )}
      </div>
      <div className="mono tabular" style={{ fontSize: 10, lineHeight: 1.7 }}>
        <div>R <span style={{ fontWeight: 700 }}>{roll.toFixed(1)}°</span></div>
        <div>P <span style={{ fontWeight: 700 }}>{pitch.toFixed(1)}°</span></div>
        <div>Y <span style={{ fontWeight: 700 }}>{yaw.toFixed(1)}°</span></div>
      </div>
    </div>
  );
}

          setTargetXYZ={setTargetXYZ}
          onCommit={onCommit}
          viewMode={viewMode}
          showWorkspace={showWorkspace}
          catchPath={catchPath}
          dronePos={dronePos}
          droneTrail={droneTrail}
          showCamFov={showCamFov}

            <span style={{ color: '#1565c0', fontWeight: 700 }}> Z</span> up

        </div>

          <span className="mono" style={{ fontSize: 9.5, color: 'var(--grey-1)', letterSpacing: '0.1em' }}>
            DRAG TIP TO MOVE · LMB ORBIT · WHEEL ZOOM
          </span>
        </div>

        {/* Cam tracking HUD (bottom-right) */}
        {camStatus?.connected && (
          <div style={{
            position: 'absolute', bottom: 12, right: 14,
            background: 'var(--paper)', border: '2px solid var(--ink)',
            padding: '8px 11px', minWidth: 210,

            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>

                <span style={{ color: dronePos ? 'var(--signal-2)' : 'var(--grey-2)', marginRight: 6 }}>{dronePos ? '●' : '○'}</span>
                CAM TRACK

              <span className="mono" style={{ fontSize: 9, color: 'var(--grey-1)', letterSpacing: '0.12em' }}>
                {camStatus.fps ? camStatus.fps.toFixed(1) : '--'} fps
              </span>
            </div>
            {dronePos ? (
              <div className="mono tabular" style={{ fontSize: 11, lineHeight: 1.5 }}>
                <span style={{ color: 'var(--grey-1)' }}>WORLD</span>{' '}
                X <b>{dronePos.x.toFixed(2)}</b>{' '}
                Y <b>{dronePos.y.toFixed(2)}</b>{' '}
                Z <b>{dronePos.z.toFixed(2)}</b>{' '}
                <span style={{ color: 'var(--grey-1)' }}>in</span>
              </div>
            ) : (
              <div className="mono" style={{ fontSize: 11, color: 'var(--hazard)', letterSpacing: '0.08em' }}>
                NO MARKER IN VIEW
              </div>
            )}
            {camStatus.raw && (
              <div className="mono tabular" style={{ fontSize: 9.5, color: 'var(--grey-1)', marginTop: 3 }}>
                cam {camStatus.raw.x.toFixed(0)}, {camStatus.raw.y.toFixed(0)}, {camStatus.raw.z.toFixed(0)} mm
              </div>
            )}
            {/* HUD catch button */}
            {camStatus.catchPhase ? (
              <div style={{ marginTop: 8, display: 'flex', gap: 6, alignItems: 'center' }}>
                <span className="mono" style={{ fontSize: 10, color: 'var(--hazard)', fontWeight: 700, letterSpacing: '0.12em' }}>
                  ▶ {camStatus.catchPhase.toUpperCase()}
                </span>
                <button
                  onClick={camStatus.catchAbort}
                  style={{ marginLeft: 'auto', padding: '3px 10px', fontSize: 10, background: 'var(--hazard)', color: 'white', borderColor: 'var(--hazard-2)' }}
                >ABORT</button>
              </div>
            ) : (
              <button
                onClick={camStatus.catchDrone}
                disabled={!dronePos}
                style={{
                  marginTop: 8, width: '100%', padding: '6px 8px',
                  background: dronePos ? 'var(--hazard)' : 'var(--paper-2)',
                  color: dronePos ? 'white' : 'var(--grey-2)',
                  borderColor: dronePos ? 'var(--hazard-2)' : 'var(--hairline)',
                  fontWeight: 700, letterSpacing: '0.08em', fontSize: 11,
                }}
              >► CATCH DRONE</button>
            )}
          </div>
        )}
        {/* Target overlay */}
        {targetXYZ && (
          <div style={{
            position: 'absolute', top: 14, left: 14,
            background: 'var(--paper)', border: '2px solid var(--ink)',
            padding: '10px 12px', minWidth: 200,
          }}>
            <div className="display" style={{ fontSize: 11, marginBottom: 6 }}>
              <span style={{ color: 'var(--hazard)', marginRight: 6 }}>►</span>
              TARGET
            </div>
            <Readout label="X" value={targetXYZ.x.toFixed(2)} unit="in" />
            <Readout label="Y" value={targetXYZ.y.toFixed(2)} unit="in" />
            <Readout label="Z" value={targetXYZ.z.toFixed(2)} unit="in" />
            <div style={{ height: 1, background: 'var(--ink)', margin: '6px 0' }} />
            {ghostIK?.ok ? (
              <>
                <Readout label="B→" value={ghostIK.b.toFixed(1)} unit="°" />
                <Readout label="S→" value={ghostIK.s.toFixed(1)} unit="°" />
                <Readout label="E→" value={ghostIK.e.toFixed(1)} unit="°" />
              </>
            ) : (
              <div className="mono" style={{ fontSize: 10, color: 'var(--hazard-2)' }}>✖ {ghostIK?.err}</div>
            )}
            <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
              <button onClick={() => setTargetXYZ(null)} style={{ flex: 1 }}>ESC</button>
              <button className="primary" disabled={!ghostIK?.ok}
                onClick={() => onCommit(targetXYZ)} style={{ flex: 1 }}>COMMIT</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function TopDownTrace({ tip, history, sendLine, setTargetXYZ }) {
  const ref = useRef(null);
  const [dragTarget, setDragTarget] = useState(null);
  const [hover, setHover] = useState(false);
  const dragRef = useRef(null);
  if (!dragRef.current) dragRef.current = { active: false, lastSent: 0 };

  // Convention: top-down view with operator looking DOWN at the arm.
  //   World +X (forward, away from operator) = screen UP (toward top)
  //   World +Y (left in operator's frame)    = screen LEFT
  //   World +Z (up)                          = into the page (not shown)
  // So pixel position is:
  //   screen_x = cx - world_y * scale     (left = +Y)
  //   screen_y = cy - world_x * scale     (up   = +X)
  const getMapping = () => {
    const cv = ref.current;
    if (!cv) return null;
    const w = cv.clientWidth, h = cv.clientHeight;
    const cx = w / 2, cy = h / 2;
    const scale = Math.min(w, h) * 0.45 / REACH;
    return {
      w, h, cx, cy, scale,
      worldToPix: (wx, wy) => ({ x: cx - wy * scale, y: cy - wx * scale }),
      pixToWorld: (px, py) => ({ x: -(py - cy) / scale, y: -(px - cx) / scale }),
    };
  };

  const evToPix = (e) => {
    const cv = ref.current;
    const rect = cv.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  };

  const commit = (wx, wy, immediate) => {
    const r = Math.sqrt(wx * wx + wy * wy);
    if (r > REACH) {
      const k = (REACH - 0.5) / r;
      wx *= k; wy *= k;
    }
    setDragTarget({ x: wx, y: wy });
    setTargetXYZ?.({ x: wx, y: wy, z: tip.z });
    const now = performance.now();
    if (immediate || now - dragRef.current.lastSent >= 80) {
      dragRef.current.lastSent = now;
      sendLine?.(`c ${wx.toFixed(2)} ${wy.toFixed(2)} ${tip.z.toFixed(2)}`);
    }
  };

  const onDown = (e) => {
    if (!sendLine) return;
    if (e.cancelable) e.preventDefault();
    const map = getMapping(); if (!map) return;
    const p = evToPix(e);
    const w = map.pixToWorld(p.x, p.y);
    dragRef.current.active = true;
    commit(w.x, w.y, true);

    const onMove = (ev) => {
      if (!dragRef.current.active) return;
      if (ev.cancelable) ev.preventDefault();
      const m = getMapping(); if (!m) return;
      const pp = evToPix(ev);
      const ww = m.pixToWorld(pp.x, pp.y);
      commit(ww.x, ww.y, false);
    };
    const onUp = (ev) => {
      dragRef.current.active = false;
      if (ev) {
        const m = getMapping();
        if (m) {
          const pp = evToPix(ev);
          const ww = m.pixToWorld(pp.x, pp.y);
          commit(ww.x, ww.y, true);
        }
      }
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onUp);
      window.removeEventListener('touchcancel', onUp);
      setTimeout(() => { setDragTarget(null); setTargetXYZ?.(null); }, 600);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onUp);
    window.addEventListener('touchcancel', onUp);
  };

  useEffect(() => {
    const cv = ref.current;
    if (!cv) return;
    const dpr = window.devicePixelRatio || 1;
    const w = cv.clientWidth, h = cv.clientHeight;
    cv.width = w * dpr; cv.height = h * dpr;
    const ctx = cv.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 1;
    ctx.strokeRect(0.5, 0.5, w - 1, h - 1);
    const cx = w / 2, cy = h / 2;
    const scale = Math.min(w, h) * 0.45 / REACH;

    // grid
    ctx.strokeStyle = 'rgba(10,10,10,0.08)';
    for (let r = 5; r <= REACH; r += 5) {
      ctx.beginPath(); ctx.arc(cx, cy, r * scale, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.beginPath();
    ctx.moveTo(cx, 0); ctx.lineTo(cx, h);
    ctx.moveTo(0, cy); ctx.lineTo(w, cy);
    ctx.stroke();

    ctx.strokeStyle = '#1565c0';
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.arc(cx, cy, REACH * scale, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);

    // history line — apply same convention
    if (history.length > 1) {
      ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 1.4;
      ctx.beginPath();
      for (let i = 0; i < history.length; i++) {
        const p = history[i];
        const px = cx - p.y * scale;
        const py = cy - p.x * scale;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }

    // drag target ghost
    if (dragTarget) {
      const tpx = cx - dragTarget.y * scale;
      const tpy = cy - dragTarget.x * scale;
      const cpx = cx - tip.y * scale, cpy = cy - tip.x * scale;
      ctx.strokeStyle = 'rgba(255, 87, 34, 0.4)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([3, 3]);
      ctx.beginPath();
      ctx.moveTo(cpx, cpy); ctx.lineTo(tpx, tpy);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.strokeStyle = '#ff5722';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(tpx, tpy, 8, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath(); ctx.arc(tpx, tpy, 2, 0, Math.PI * 2);
      ctx.fillStyle = '#ff5722'; ctx.fill();
    }

    // current tip
    const px = cx - tip.y * scale;
    const py = cy - tip.x * scale;
    ctx.fillStyle = '#ff5722';
    ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 1; ctx.stroke();

    // axis labels — match the new convention
    ctx.fillStyle = '#0a0a0a';
    ctx.font = '10px IBM Plex Mono';
    ctx.fillText('+X', cx + 4, 12);    // top of canvas
    ctx.fillText('+Y', 4, cy - 4);     // left side
    if (sendLine) {
      ctx.fillStyle = hover ? '#ff5722' : 'rgba(10,10,10,0.5)';
      ctx.font = '9px IBM Plex Mono';
      ctx.fillText(hover ? 'CLICK + DRAG TO MOVE TIP' : 'click + drag to move tip', 8, h - 8);
    }
  });

  return (
    <canvas
      ref={ref}
      onMouseDown={onDown}
      onTouchStart={onDown}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        width: '100%', height: '320px', display: 'block',
        cursor: sendLine ? (hover ? 'crosshair' : 'pointer') : 'default',
        touchAction: 'none',
      }}
    />
  );
}

        </div>
      </div>

}

// ============================================================================
// RIGHT PANEL (mode-specific)
// ============================================================================
function RightPanel(props) {
  const { mode, sendChar, sendLine, setMode } = props;
  return (
    <div className="panel scrollbar" style={{ height: '100%', overflowY: 'auto', borderLeft: 0 }}>
      <SectionHeader num="F" title="MODE" />
      <div style={{ padding: '14px 16px' }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 4 }}>
          {[['MANUAL','M'],['DEBUG','B'],['HEIGHT','H'],['XYZ','K'],['DANCE','D'],['TILT','T']].map(([n, c]) => (
            <button
              key={c}
              className={mode === n ? 'active' : ''}
              onClick={() => { sendChar(c); setMode(n); }}
              style={{ padding: '8px 4px' }}
            >{n}</button>
          ))}
        </div>
      </div>

      <SectionHeader num="G" title="POSES" />
      <div style={{ padding: '14px 16px' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4 }}>
          <button onClick={() => sendChar('6')}><span className="kbd" style={{ marginRight: 6 }}>6</span> HOME</button>
          <button onClick={() => sendChar('7')}><span className="kbd" style={{ marginRight: 6 }}>7</span> READY</button>
          <button onClick={() => sendChar('8')}><span className="kbd" style={{ marginRight: 6 }}>8</span> CATCH</button>
          <button onClick={() => sendChar('9')}><span className="kbd" style={{ marginRight: 6 }}>9</span> EXTEND</button>
          <button onClick={() => sendChar('0')} style={{ gridColumn: 'span 2' }}>
            <span className="kbd" style={{ marginRight: 6 }}>0</span> RETRACT
          </button>
        </div>
      </div>

      <SectionHeader num="H" title={`${mode} CONTROLS`} />
      <div style={{ padding: '14px 16px' }}>
        {mode === 'MANUAL' && <ManualPanel {...props} />}
        {mode === 'DEBUG' && <ManualPanel {...props} />}
        {mode === 'DANCE' && <DancePanel {...props} />}
        {mode === 'HEIGHT' && <HeightPanel {...props} />}
        {mode === 'XYZ' && <XYZPanel {...props} />}
        {mode === 'TILT' && <TiltPanel {...props} />}
      </div>
    </div>
  );
}

// Simple click-jog button. Used for discrete one-shot jogs and pose buttons.
// onClick fires once per press. (XYZ nudge buttons use this.)
function JogBtn({ onClick, children, color }) {
  return (
    <button onMouseDown={onClick} style={{
      padding: '12px 8px',
      fontFamily: 'IBM Plex Mono, monospace', fontSize: 12, fontWeight: 700,
      letterSpacing: '0.06em',
      borderColor: color || 'var(--ink)',
      color: color || 'var(--ink)',
    }}>{children}</button>
  );
}

// Hold-to-jog button. Press and hold = repeats sendChar(char) at 90ms while
// held. The firmware's manual-pulse handler keeps the motor running for
// ~500ms per char, so successive chars chain into smooth-ish continuous
// motion. Releases: stop sending; firmware's last pulse times out on its own.
// Compatible with v3 firmware (no `j` jog command needed).
function HoldJogBtn({ char, label, color, sendChar }) {
  const heldRef = useRef(false);
  const intervalRef = useRef(null);

  const start = (e) => {
    if (e?.cancelable) e.preventDefault();
    if (heldRef.current) return;
    heldRef.current = true;
    sendChar(char);
    intervalRef.current = setInterval(() => sendChar(char), 90);
  };
  const stop = (e) => {
    if (e?.cancelable) e.preventDefault();
    heldRef.current = false;
    if (intervalRef.current) { clearInterval(intervalRef.current); intervalRef.current = null; }
  };

  useEffect(() => () => {
    if (intervalRef.current) clearInterval(intervalRef.current);
  }, []);

  return (
    <button
      onMouseDown={start}
      onMouseUp={stop}
      onMouseLeave={stop}
      onTouchStart={start}
      onTouchEnd={stop}
      onTouchCancel={stop}
      style={{
        padding: '12px 8px',
        fontFamily: 'IBM Plex Mono, monospace', fontSize: 12, fontWeight: 700,
        letterSpacing: '0.06em', userSelect: 'none', touchAction: 'none',
        borderColor: color || 'var(--ink)',
        color: color || 'var(--ink)',
      }}>
      {label}
    </button>
  );
}

function ManualPanel({ sendChar, sendLine, speed }) {
  return (
    <>
      <div className="label" style={{ marginBottom: 6 }}>BASE</div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4, marginBottom: 12 }}>
        <HoldJogBtn char="q" sendChar={sendChar} label="◀ HOLD" />
        <HoldJogBtn char="1" sendChar={sendChar} label="HOLD ▶" />
      </div>
      <div className="label" style={{ marginBottom: 6 }}>SHOULDER</div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4, marginBottom: 12 }}>
        <HoldJogBtn char="w" sendChar={sendChar} label="◀ HOLD" />
        <HoldJogBtn char="2" sendChar={sendChar} label="HOLD ▶" />
      </div>
      <div className="label" style={{ marginBottom: 6 }}>ELBOW</div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4, marginBottom: 14 }}>
        <HoldJogBtn char="e" sendChar={sendChar} label="◀ HOLD" />
        <HoldJogBtn char="3" sendChar={sendChar} label="HOLD ▶" />
      </div>
      <div style={{ height: 1, background: 'var(--hairline)', margin: '8px 0' }} />
      <div className="label" style={{ marginBottom: 6 }}>WRIST ROLL</div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4, marginBottom: 10 }}>
        <HoldJogBtn char="f" sendChar={sendChar} label="◀ HOLD" />
        <HoldJogBtn char="4" sendChar={sendChar} label="HOLD ▶" />
      </div>
      <div className="label" style={{ marginBottom: 6 }}>WRIST PITCH</div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4 }}>
        <HoldJogBtn char="t" sendChar={sendChar} label="◀ HOLD" />
        <HoldJogBtn char="5" sendChar={sendChar} label="HOLD ▶" />
      </div>
    </>
  );
}

function DancePanel({ sendChar, sendLine, activeDance, setActiveDance, loop }) {
  return (
    <>
      <div className="label" style={{ marginBottom: 6 }}>ROUTINE</div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4, marginBottom: 14 }}>
        {DANCE_NAMES.map((n, i) => (
          <button
            key={n}
            className={activeDance === i ? 'active' : ''}
            onClick={() => setActiveDance(i)}
            style={{ fontSize: 10, padding: '8px 4px' }}
          >{n.toUpperCase()}</button>
        ))}
      </div>
      <button className="primary" onClick={() => sendChar('G')} style={{ width: '100%', padding: 14, marginBottom: 8 }}>
        ▶ GO
      </button>
      <button
        className={loop ? 'active' : ''}
        onClick={() => sendChar('L')}
        style={{ width: '100%', padding: 10, marginBottom: 14 }}
      >LOOP · {loop ? 'ON' : 'OFF'}</button>
      <button className="hazard" onClick={() => sendChar('X')} style={{ width: '100%' }}>
        ABORT
      </button>
    </>
  );
}

function HeightPanel({ sendLine }) {
  const [h, setH] = useState('');
  const submit = () => {
    const v = parseFloat(h);
    if (isNaN(v) || v <= 0 || v > REACH + SHLD_OFF) return;
    sendLine(h); setH('');
  };
  return (
    <>
      <div className="label" style={{ marginBottom: 6 }}>HEIGHT (Z, base frame)</div>
      <input
        type="number" step="0.5" min="0.5" max={REACH + SHLD_OFF}
        value={h}
        onChange={(e) => setH(e.target.value)}
        onKeyDown={(e) => { if (e.key === 'Enter') submit(); }}
        placeholder="inches"
      />
      <button className="primary" onClick={submit} style={{ width: '100%', marginTop: 8 }}>EXECUTE</button>
      <div className="mono" style={{ fontSize: 10, color: 'var(--grey-1)', marginTop: 12, lineHeight: 1.5 }}>
        RANGE 0—{(REACH + SHLD_OFF).toFixed(1)} in<br/>
        Tip directly above base axis.
      </div>
    </>
  );
}

function AxisSlider({ axis, label, value, min, max, onInput, onRelease, color }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 4 }}>
        <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
          <span style={{ width: 8, height: 8, background: color }} />
          <span className="display" style={{ fontSize: 11, color }}>{label}</span>
        </span>
        <span className="mono tabular" style={{ fontSize: 13, fontWeight: 700, color }}>
          {value >= 0 ? '+' : ''}{value.toFixed(2)}″
        </span>
      </div>
      <input
        type="range"
        className={`axis-slider ${axis}`}
        min={min} max={max} step={0.25}
        value={value}
        onChange={(e) => onInput(+e.target.value)}
        onMouseUp={onRelease}
        onTouchEnd={onRelease}
      />
      <div className="mono" style={{ display: 'flex', justifyContent: 'space-between', fontSize: 9, color: 'var(--grey-1)' }}>
        <span>{min}</span><span>0</span><span>+{max}</span>
      </div>
    </div>
  );
}

function XYZPanel({ sendLine, sendChar, fkTip, setTargetXYZ, targetXYZ }) {
  const [local, setLocal] = useState({ x: fkTip.x, y: fkTip.y, z: fkTip.z });
  useEffect(() => {
    if (!targetXYZ) setLocal({ x: fkTip.x, y: fkTip.y, z: fkTip.z });
  }, [fkTip.x, fkTip.y, fkTip.z, targetXYZ]);
  const update = (axis, v) => {
    const next = { ...local, [axis]: v };
    setLocal(next);
    setTargetXYZ(next);
  };
  const commit = () => {
    const r = ik(local.x, local.y, local.z);
    if (!r.ok) return;
    sendLine(`c ${local.x.toFixed(2)} ${local.y.toFixed(2)} ${local.z.toFixed(2)}`);
    setTimeout(() => setTargetXYZ(null), 350);
  };
  const ghostIk = ik(local.x, local.y, local.z);
  return (
    <>
      <div className="label" style={{ marginBottom: 10 }}>CART. POSITION</div>
      <AxisSlider axis="x" label="X · FORWARD" color="#d32f2f"
        value={local.x} min={-REACH} max={REACH}
        onInput={(v) => update('x', v)} onRelease={commit} />
      <AxisSlider axis="y" label="Y · LEFT" color="#2e7d32"
        value={local.y} min={-REACH} max={REACH}
        onInput={(v) => update('y', v)} onRelease={commit} />
      <AxisSlider axis="z" label="Z · UP" color="#1565c0"
        value={local.z} min={0} max={REACH + SHLD_OFF}
        onInput={(v) => update('z', v)} onRelease={commit} />
      {!ghostIk.ok && (
        <div className="mono" style={{
          padding: '6px 10px', marginBottom: 10,
          border: '1px solid var(--hazard)', background: 'rgba(255,87,34,0.08)',
          fontSize: 11, color: 'var(--hazard-2)',
        }}>✖ IK: {ghostIk.err}</div>
      )}
      <div style={{ height: 1, background: 'var(--ink)', margin: '14px 0' }} />
      <div className="label" style={{ marginBottom: 6 }}>STEP NUDGE</div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 4, marginBottom: 4 }}>
        <div />
        <JogBtn onClick={() => sendChar('w')} color="#d32f2f">+X</JogBtn>
        <div />
        <JogBtn onClick={() => sendChar('a')} color="#2e7d32">+Y</JogBtn>
        <JogBtn onClick={() => sendChar('s')} color="#d32f2f">−X</JogBtn>
        <JogBtn onClick={() => sendChar('d')} color="#2e7d32">−Y</JogBtn>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 4, marginTop: 6 }}>
        <JogBtn onClick={() => sendChar('q')} color="#1565c0">+Z</JogBtn>
        <JogBtn onClick={() => sendChar('e')} color="#1565c0">−Z</JogBtn>
      </div>
    </>
  );
}

function TiltPanel({ sendChar, sendLine, imuReady, fkTip }) {
  return (
    <>
      {!imuReady && (
        <div style={{ padding: 10, border: '2px solid var(--hazard)', marginBottom: 12, background: 'rgba(255,87,34,0.05)' }}>
          <div className="label" style={{ color: 'var(--hazard-2)', marginBottom: 4 }}>! IMU OFFLINE</div>
          <div className="mono" style={{ fontSize: 10.5, lineHeight: 1.5, color: 'var(--ink-2)' }}>
            Wiring: SDA=18 SCL=19 (Wire). Tilt mode requires the IMU.
          </div>
        </div>
      )}
      <button className="primary" onClick={() => sendChar('h')} style={{ width: '100%', padding: 16, marginBottom: 8 }}>
        ⟲ HOLD HERE
      </button>
      <div className="mono" style={{ fontSize: 10.5, lineHeight: 1.6, color: 'var(--ink-2)', marginBottom: 12 }}>
        Captures current tip XYZ as world target + snaps a fresh IMU reference.
        Arm will counter-rotate against boat motion to hold the tip in world coords.
      </div>
      <div className="frame" style={{ marginBottom: 10 }}>
        <span className="frame-label">CURRENT TIP</span>
        <Readout label="X" value={fkTip.x.toFixed(2)} unit="in" />
        <Readout label="Y" value={fkTip.y.toFixed(2)} unit="in" />
        <Readout label="Z" value={fkTip.z.toFixed(2)} unit="in" />
      </div>
      <div className="label" style={{ marginBottom: 6 }}>SIGN CALIBRATION</div>
      <div className="mono" style={{ fontSize: 10, color: 'var(--grey-1)', marginBottom: 6, lineHeight: 1.5 }}>
        If the arm corrects opposite to the tilt direction, flip that axis sign.
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 4, marginBottom: 12 }}>
        <button onClick={() => sendLine('tflip r')}>±ROLL</button>
        <button onClick={() => sendLine('tflip p')}>±PITCH</button>
        <button onClick={() => sendLine('tflip y')}>±YAW</button>
      </div>
      <button className="hazard" onClick={() => sendChar('X')} style={{ width: '100%' }}>CLEAR HOLD</button>
    </>
  );
}

// ============================================================================
// TERMINAL
// ============================================================================
function Terminal({ lines, termRef, cmdInput, setCmdInput, onSubmit, streamOn }) {
  return (
    <div style={{
      background: 'var(--paper)',
      borderTop: '1px solid var(--ink)',
      display: 'flex', flexDirection: 'column', minHeight: 0,
    }}>
      <div style={{
        padding: '6px 14px', borderBottom: '1px solid var(--ink)',
        background: 'var(--paper-2)',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <span className="display" style={{ fontSize: 11 }}>SERIAL CONSOLE</span>
          <span className="chip" style={{ height: 18, fontSize: 9 }}>{lines.length} LINES</span>
        </div>
        <span className="mono" style={{ fontSize: 9.5, color: 'var(--grey-1)' }}>
          STREAM {streamOn ? '● ON' : '○ OFF'} · TX/RX
        </span>
      </div>
      <div ref={termRef} className="mono scrollbar" style={{
        flex: 1, overflowY: 'auto', padding: '6px 14px',
        fontSize: 11, lineHeight: 1.5,
        background: '#fff',
      }}>
        {lines.map((l, i) => (
          <div key={i} className="terminal-line" style={{
            color: l.t === 'tx' ? 'var(--hazard-2)' : l.t === 'err' ? 'var(--hazard-2)'
              : l.t === 'sys' ? 'var(--plot)' : 'var(--ink)',
          }}>
            <span style={{ color: 'var(--grey-1)', marginRight: 8, fontWeight: 700 }}>
              {l.t === 'tx' ? '►' : l.t === 'err' ? '✖' : l.t === 'sys' ? '◆' : '◦'}
            </span>
            {l.s}
          </div>
        ))}
      </div>
      <div style={{ display: 'flex', alignItems: 'center', borderTop: '1px solid var(--ink)' }}>
        <span style={{
          padding: '0 12px', fontFamily: 'IBM Plex Mono, monospace',
          color: 'var(--hazard)', fontSize: 13, fontWeight: 700,
        }}>►</span>
        <input
          value={cmdInput}
          onChange={(e) => setCmdInput(e.target.value)}
          onKeyDown={(e) => { if (e.key === 'Enter' && cmdInput.trim()) onSubmit(cmdInput.trim()); }}
          placeholder="raw command (e.g. c 10 0 25, dn 2, tflip r)"
          style={{ border: 'none', background: 'transparent', padding: '10px 0' }}
        />
      </div>
    </div>
  );
}

root.render(<App />);
</script>
