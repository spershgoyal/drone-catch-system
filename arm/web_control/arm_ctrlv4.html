<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ARM-01 / GROUND CONTROL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   ARM-01 GROUND CONTROL — design: swiss/grid base + military accents
   palette: bone white, ink black, hazard orange, graph paper grey
   ========================================================================= */
:root {
  --paper:        #f4f1e8;
  --paper-2:      #ebe7da;
  --paper-line:   #d4cfbe;
  --ink:          #0a0a0a;
  --ink-2:        #1a1a1a;
  --ink-soft:     #2c2c2c;
  --grey-1:       #6b6b6b;
  --grey-2:       #9a9a9a;
  --grey-3:       #c2c0b6;
  --hazard:       #ff5722;
  --hazard-2:     #d94317;
  --signal:       #2e7d32;
  --signal-2:     #1b5e20;
  --warn:         #ffa000;
  --plot:         #1565c0;
  --grid-line:    rgba(10,10,10,0.06);
  --hairline:     rgba(10,10,10,0.12);
  --hairline-strong: rgba(10,10,10,0.25);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; overflow: hidden; }
body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 13px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
  background-size: 20px 20px;
}
.mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-feature-settings: "ss01", "ss02"; }
.display { font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: -0.01em; }
.label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.16em;
  color: var(--grey-1);
  text-transform: uppercase;
}
.label-strong { color: var(--ink); }
.tabular { font-variant-numeric: tabular-nums; }

/* hazard stripes used sparingly for warnings/limits */
.hazard-stripe {
  background: repeating-linear-gradient(45deg,
    var(--hazard) 0 8px, var(--ink) 8px 16px);
}
.hazard-stripe-thin {
  background: repeating-linear-gradient(45deg,
    rgba(255,87,34,0.5) 0 4px, transparent 4px 8px);
}

/* panels: white on paper-with-grid */
.panel {
  background: var(--paper);
  border: 1px solid var(--ink);
  position: relative;
}
.panel-section { padding: 14px 16px; border-bottom: 1px solid var(--hairline); }
.panel-section:last-child { border-bottom: 0; }

/* corner reg marks (military-spec touch) */
.regmark {
  position: absolute; width: 6px; height: 6px; border: 1px solid var(--ink); pointer-events: none;
}
.regmark.tl { top: 4px; left: 4px; border-right: 0; border-bottom: 0; }
.regmark.tr { top: 4px; right: 4px; border-left: 0; border-bottom: 0; }
.regmark.bl { bottom: 4px; left: 4px; border-right: 0; border-top: 0; }
.regmark.br { bottom: 4px; right: 4px; border-left: 0; border-top: 0; }

/* buttons */
button {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink);
  background: var(--paper);
  border: 1px solid var(--ink);
  padding: 7px 11px;
  cursor: pointer;
  transition: background 0.08s ease, color 0.08s ease;
  position: relative;
}
button:hover:not(:disabled) {
  background: var(--ink);
  color: var(--paper);
}
button:active:not(:disabled) { background: var(--ink-2); transform: translateY(0.5px); }
button:disabled { opacity: 0.3; cursor: not-allowed; }

button.primary { background: var(--ink); color: var(--paper); }
button.primary:hover:not(:disabled) { background: var(--ink-soft); }

button.active {
  background: var(--ink);
  color: var(--paper);
  position: relative;
}
button.active::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--hazard);
}

button.hazard {
  background: var(--paper);
  color: var(--ink);
  border: 2px solid var(--hazard);
  font-weight: 700;
  position: relative;
  padding: 9px 13px;
}
button.hazard::before {
  content: '';
  position: absolute; left: -2px; right: -2px; top: -2px; bottom: -2px;
  background: repeating-linear-gradient(45deg,
    transparent 0 6px, rgba(255,87,34,0.15) 6px 12px);
  pointer-events: none;
}
button.hazard:hover:not(:disabled) {
  background: var(--hazard); color: var(--paper);
}
button.signal { color: var(--signal-2); border-color: var(--signal-2); }
button.signal:hover:not(:disabled) { background: var(--signal-2); color: var(--paper); }

input, select, textarea {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--ink);
  background: var(--paper);
  border: 1px solid var(--ink);
  padding: 7px 9px;
  width: 100%;
  outline: none;
}
input:focus { background: #fff; box-shadow: inset 0 0 0 2px var(--ink); }
input[type="range"] {
  -webkit-appearance: none; appearance: none;
  width: 100%; background: transparent; padding: 0; border: 0; height: 22px;
}
input[type="range"]::-webkit-slider-runnable-track {
  height: 2px; background: var(--ink);
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 12px; height: 18px; background: var(--hazard);
  border: 1px solid var(--ink); border-radius: 0; margin-top: -8px;
}

/* axis sliders */
.axis-slider {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 32px;
  background: transparent; padding: 0; border: 0; cursor: pointer;
}
.axis-slider::-webkit-slider-runnable-track {
  height: 6px; background: var(--paper-2); border: 1px solid var(--ink);
}
.axis-slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 16px; height: 24px;
  background: var(--thumb, var(--hazard));
  border: 1px solid var(--ink); border-radius: 0;
  margin-top: -10px;
  cursor: grab;
}
.axis-slider:active::-webkit-slider-thumb { cursor: grabbing; }
.axis-slider.x { --thumb: #d32f2f; }
.axis-slider.y { --thumb: #2e7d32; }
.axis-slider.z { --thumb: #1565c0; }

/* scrollbar */
.scrollbar::-webkit-scrollbar { width: 10px; height: 10px; }
.scrollbar::-webkit-scrollbar-track { background: var(--paper-2); }
.scrollbar::-webkit-scrollbar-thumb { background: var(--ink); border: 2px solid var(--paper-2); }

/* readouts */
.readout-value {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  font-size: 13px;
  color: var(--ink);
}
.readout-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 3px 0;
}

/* telemetry bars */
.tbar {
  position: relative;
  height: 12px;
  background: var(--paper);
  border: 1px solid var(--ink);
}
.tbar .fill {
  position: absolute; top: 0; bottom: 0;
  background: var(--ink);
  transition: width 0.1s linear, left 0.1s linear;
}
.tbar .forbid {
  position: absolute; top: 0; bottom: 0;
  background: repeating-linear-gradient(45deg,
    rgba(255,87,34,0.7) 0 3px, transparent 3px 6px);
  border-left: 1px solid var(--hazard);
  border-right: 1px solid var(--hazard);
  pointer-events: none;
}
.tbar .center {
  position: absolute; top: -2px; bottom: -2px;
  width: 1px; background: var(--ink); left: 50%;
}
.tbar .target {
  position: absolute; top: -3px; bottom: -3px;
  width: 2px; background: var(--hazard);
  box-shadow: 0 0 0 1px var(--ink);
}

/* chips */
.chip {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 4px 8px;
  border: 1px solid var(--ink);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  background: var(--paper);
  height: 26px;
}
.chip.dark { background: var(--ink); color: var(--paper); }
.chip.signal { background: var(--signal-2); color: var(--paper); border-color: var(--signal-2); }
.chip.warn { background: var(--warn); color: var(--ink); border-color: var(--ink); }

/* status dot */
.dot {
  width: 8px; height: 8px;
  border: 1px solid currentColor;
}
.dot.solid { background: currentColor; }

/* keyboard hint */
.kbd {
  display: inline-block;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  padding: 1px 5px;
  border: 1px solid var(--ink);
  background: var(--paper);
  min-width: 18px; text-align: center;
}

/* tabs */
.tab {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 9px 16px;
  border: 0;
  border-right: 1px solid var(--ink);
  background: var(--paper);
  cursor: pointer;
  color: var(--grey-1);
  position: relative;
  height: 100%;
}
.tab:hover { color: var(--ink); }
.tab.active {
  color: var(--ink);
  background: var(--ink);
  color: var(--paper);
}
.tab.active::after {
  content: '';
  position: absolute; left: 0; right: 0; bottom: 0;
  height: 2px;
  background: var(--hazard);
}

/* big section header */
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  background: var(--ink);
  color: var(--paper);
}
.section-head .num {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  color: var(--hazard);
  margin-right: 10px;
  letter-spacing: 0.1em;
}
.section-head .title {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.04em;
}

/* terminal */
.terminal-line { white-space: pre-wrap; padding: 1px 0; }

/* animations */
@keyframes blink { 50% { opacity: 0; } }
@keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
.blink { animation: blink 1s steps(2, start) infinite; }
.pulse { animation: pulse-dot 1.5s ease-in-out infinite; }

@keyframes scroll-bar {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(400%); }
}
.scan-bar {
  position: absolute; top: 0; left: 0; height: 2px; width: 25%;
  background: var(--hazard);
  animation: scroll-bar 3s linear infinite;
}

/* "framed" data label like nautical/aviation gauges */
.frame {
  border: 1px solid var(--ink);
  padding: 8px 10px;
  position: relative;
}
.frame .frame-label {
  position: absolute;
  top: -7px; left: 8px;
  background: var(--paper);
  padding: 0 6px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--grey-1);
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.9/babel.min.js" crossorigin></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ============================================================================
// CONSTANTS (must match firmware)
// ============================================================================
const L1 = 13.75, L2 = 17.0, SHLD_OFF = 3.0;
const REACH = L1 + L2;
const JOINT_MIN = { b: -180, s: -80, e: -110 };
const JOINT_MAX = { b: 180, s: 80, e: 110 };
const SHLD_FORBID = [-10, 10];
const Z_FLOOR = 0;

const MODE_NAMES = ["MANUAL","DEBUG","HEIGHT","XYZ","DANCE","TILT"];
const DANCE_NAMES = ["showcase","greet","idle","combat","chase"];

// ============================================================================
// CAM TRACKING (single ESP32-CAM, mounted right of base, pointing up)
// ============================================================================
// Cam is 15" right of the arm base, USB port faces the arm (so USB is on the
// -X side of the cam body). Lens points STRAIGHT UP at the catch zone.
// Cam height = base level (which is 2.5" below shoulder joint).
//
// Sensor image axes (cam +X / +Y) don't necessarily line up with world axes.
// Without testing on the actual hardware we can't know which way the sensor
// is oriented, so we expose runtime knobs:
//   - rotation (0 / 90 / 180 / 270) around lens axis
//   - flipH (mirror image X)
//   - flipV (mirror image Y)
// User adjusts via UI and calibrates by moving the marker around.
//
// The "physical" mounting (cam at +X from arm, USB facing arm) is fixed and
// drawn in 3D. The image-axis remap is just how the sensor's pixels map to
// the physical world.
const CAM_WORLD = { x: 15.0, y: 0.0, z: SHLD_OFF - 2.5 };  // inches
const MM_TO_IN  = 1.0 / 25.4;
const CAM_FOV_DEG = 66;        // OV2640 stock lens, horizontal
const CAM_FOV_HEIGHT = 36;     // how tall to draw the wireframe FOV cone (in)
const TRAIL_MAX = 40;
const TRAIL_MAX_AGE_MS = 2000;

// Apply the image-axis remap (rotation + optional flips) to a cam-frame point.
// Returns rotated (x, y, z) in cam frame; z is unchanged (lens axis).
function remapCamAxes(cx, cy, cz, rotation, flipH, flipV) {
  let x = flipH ? -cx : cx;
  let y = flipV ? -cy : cy;
  let X, Y;
  switch (rotation) {
    case 90:  X = -y; Y =  x; break;
    case 180: X = -x; Y = -y; break;
    case 270: X =  y; Y = -x; break;
    default:  X =  x; Y =  y; break;  // 0
  }
  return { x: X, y: Y, z: cz };
}

function camFrameToWorld(cx_in, cy_in, cz_in, opts) {
  const o = opts || {};
  const r = remapCamAxes(cx_in, cy_in, cz_in, o.rotation || 0, !!o.flipH, !!o.flipV);
  return {
    x: CAM_WORLD.x + r.x,
    y: CAM_WORLD.y + r.y,
    z: CAM_WORLD.z + r.z + (o.zOffset || 0),
  };
}

// ============================================================================
// IK / FK
// ============================================================================
function fk(bDeg, sDeg, eDeg) {
  const b = bDeg * Math.PI / 180;
  const s = sDeg * Math.PI / 180;
  const e = eDeg * Math.PI / 180;
  const r = -L1 * Math.sin(s) + L2 * Math.sin(e - s);
  const z = L1 * Math.cos(s) + L2 * Math.cos(e - s) + SHLD_OFF;
  return { x: r * Math.cos(b), y: r * Math.sin(b), z };
}

function ik(x, y, z) {
  if (z < Z_FLOOR) return { ok: false, err: 'below floor' };
  const zShld = z - SHLD_OFF;
  const r = Math.sqrt(x*x + y*y);
  const d = Math.sqrt(r*r + zShld*zShld);
  if (d > REACH + 0.01) return { ok: false, err: 'too far' };
  if (d < Math.abs(L1 - L2) - 0.01) return { ok: false, err: 'too close' };
  const cosE = (d*d - L1*L1 - L2*L2) / (2 * L1 * L2);
  if (Math.abs(cosE) > 1) return { ok: false, err: 'no solution' };
  const baseDeg = Math.atan2(y, x) * 180 / Math.PI;
  const sols = [];
  for (const pos of [true, false]) {
    let e = Math.acos(cosE);
    if (!pos) e = -e;
    const A = L2 * Math.sin(e);
    const B = -L1 - L2 * Math.cos(e);
    const sDeg = Math.atan2(B * r + A * zShld, A * r - B * zShld) * 180 / Math.PI;
    const eDeg = e * 180 / Math.PI;
    let cost = 0;
    if (sDeg > JOINT_MAX.s) cost += 100 * (sDeg - JOINT_MAX.s);
    if (sDeg < JOINT_MIN.s) cost += 100 * (JOINT_MIN.s - sDeg);
    if (eDeg > JOINT_MAX.e) cost += 100 * (eDeg - JOINT_MAX.e);
    if (eDeg < JOINT_MIN.e) cost += 100 * (JOINT_MIN.e - eDeg);
    if (sDeg > SHLD_FORBID[0] && sDeg < SHLD_FORBID[1]) cost += 50;
    sols.push({ sDeg, eDeg, cost });
  }
  sols.sort((a, b) => a.cost - b.cost);
  const best = sols[0];
  if (Math.abs(best.sDeg) > JOINT_MAX.s + 0.5) return { ok: false, err: 'shoulder oor' };
  if (Math.abs(best.eDeg) > JOINT_MAX.e + 0.5) return { ok: false, err: 'elbow oor' };
  return { ok: true, b: baseDeg, s: best.sDeg, e: best.eDeg, cost: best.cost };
}

// ============================================================================
// 3D ARM (CAD-styled, matches user's actual arm)
// ============================================================================
function buildArm(opacity = 1.0) {
  const root = new THREE.Group();

  const matY = new THREE.MeshStandardMaterial({
    color: 0xd4a017, roughness: 0.42, metalness: 0.20, transparent: opacity < 1, opacity
  });
  const matD = new THREE.MeshStandardMaterial({
    color: 0x191b20, roughness: 0.55, metalness: 0.10, transparent: opacity < 1, opacity
  });
  const matR = new THREE.MeshStandardMaterial({
    color: 0xa8322a, roughness: 0.45, metalness: 0.10, transparent: opacity < 1, opacity
  });
  const matSteel = new THREE.MeshStandardMaterial({
    color: 0x9aa0a6, roughness: 0.30, metalness: 0.65, transparent: opacity < 1, opacity
  });

  // Base plate
  const basePlate = new THREE.Mesh(new THREE.CylinderGeometry(3.6, 3.9, 1.0, 48), matY);
  basePlate.position.y = 0.5;
  root.add(basePlate);
  const basePlateInner = new THREE.Mesh(new THREE.CylinderGeometry(3.0, 3.0, 0.4, 48), matD);
  basePlateInner.position.y = 1.1;
  root.add(basePlateInner);

  // Base rotation node (firmware base spins around vertical axis - three.js Y)
  const baseRot = new THREE.Group();
  baseRot.position.y = 1.3;
  root.add(baseRot);

  // Yoke (the dark center column with yellow side plates that holds shoulder)
  const yokeH = SHLD_OFF;
  const yokeCore = new THREE.Mesh(new THREE.BoxGeometry(2.4, yokeH, 2.8), matD);
  yokeCore.position.y = yokeH / 2;
  baseRot.add(yokeCore);
  for (const sx of [-1, 1]) {
    const side = new THREE.Mesh(new THREE.BoxGeometry(0.4, yokeH * 1.05, 2.6), matY);
    side.position.set(sx * 1.55, yokeH / 2, 0);
    baseRot.add(side);
  }
  // shoulder pivot hub
  const shldHub = new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.4, 3.4, 24), matD);
  shldHub.rotation.x = Math.PI / 2;
  shldHub.position.y = yokeH;
  baseRot.add(shldHub);

  // Shoulder pivot
  const shldRot = new THREE.Group();
  shldRot.position.y = SHLD_OFF;
  baseRot.add(shldRot);

  // Upper arm (L1)
  const upGroup = new THREE.Group();
  shldRot.add(upGroup);
  const upCore = new THREE.Mesh(new THREE.BoxGeometry(1.5, L1 * 0.95, 3.0), matD);
  upCore.position.y = L1 / 2;
  upGroup.add(upCore);
  for (const sx of [-1, 1]) {
    const side = new THREE.Mesh(new THREE.BoxGeometry(0.4, L1 * 0.92, 2.5), matY);
    side.position.set(sx * 0.95, L1 / 2, 0);
    upGroup.add(side);
  }

  // Elbow pivot
  const elbRot = new THREE.Group();
  elbRot.position.y = L1;
  shldRot.add(elbRot);
  const elbHub = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 3.0, 24), matD);
  elbHub.rotation.x = Math.PI / 2;
  elbRot.add(elbHub);

  // Forearm (L2)
  const feGroup = new THREE.Group();
  elbRot.add(feGroup);
  const feCore = new THREE.Mesh(new THREE.BoxGeometry(1.3, L2 * 0.95, 2.6), matD);
  feCore.position.y = L2 / 2;
  feGroup.add(feCore);
  for (const sx of [-1, 1]) {
    const side = new THREE.Mesh(new THREE.BoxGeometry(0.35, L2 * 0.9, 2.2), matY);
    side.position.set(sx * 0.85, L2 / 2, 0);
    feGroup.add(side);
  }

  // Wrist tip - red block + steel disc
  const tip = new THREE.Group();
  tip.position.y = L2;
  elbRot.add(tip);
  const redBlock = new THREE.Mesh(new THREE.BoxGeometry(2.0, 2.2, 1.6), matR);
  redBlock.position.y = 1.1;
  tip.add(redBlock);
  const blackPlate = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.6, 2.0), matD);
  blackPlate.position.y = 2.5;
  tip.add(blackPlate);
  const disc = new THREE.Mesh(new THREE.CylinderGeometry(1.15, 1.15, 0.5, 32), matSteel);
  disc.position.y = 3.2;
  tip.add(disc);
  const innerDisc = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.45, 0.55, 16), matD);
  innerDisc.position.y = 3.2;
  tip.add(innerDisc);

  return {
    root, baseRot, shldRot, elbRot, tip,
    materials: [matY, matD, matR, matSteel],
    setAngles(bDeg, sDeg, eDeg) {
      baseRot.rotation.y = bDeg * Math.PI / 180;
      shldRot.rotation.z = sDeg * Math.PI / 180;
      elbRot.rotation.z = -eDeg * Math.PI / 180;
    },
    setOpacity(o) {
      this.materials.forEach(m => { m.transparent = o < 1; m.opacity = o; m.needsUpdate = true; });
    },
  };
}

// ============================================================================
// SCENE BUILDER (used for both single + multi view)
// ============================================================================
function buildScene(parentDiv, options = {}) {
  const width = parentDiv.clientWidth;
  const height = parentDiv.clientHeight;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf4f1e8);
  scene.fog = new THREE.Fog(0xf4f1e8, 80, 180);

  const camera = new THREE.PerspectiveCamera(38, width / height, 0.5, 500);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(width, height);
  parentDiv.appendChild(renderer.domElement);

  // light
  scene.add(new THREE.AmbientLight(0xffffff, 0.45));
  const key = new THREE.DirectionalLight(0xfff0d0, 0.8);
  key.position.set(40, 50, 30);
  scene.add(key);
  const fill = new THREE.DirectionalLight(0xc0d0ff, 0.3);
  fill.position.set(-30, 20, -25);
  scene.add(fill);

  // graph paper ground
  const groundGeo = new THREE.PlaneGeometry(120, 120);
  const groundMat = new THREE.MeshBasicMaterial({ color: 0xebe7da });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.05;
  scene.add(ground);
  const grid = new THREE.GridHelper(120, 60, 0xc2c0b6, 0xd4cfbe);
  scene.add(grid);
  const gridFine = new THREE.GridHelper(120, 12, 0x9a9a9a, 0xc2c0b6);
  gridFine.position.y = 0.01;
  scene.add(gridFine);

  // axes corner
  const axes = new THREE.Group();
  const mkA = (dir, color) => {
    const g = new THREE.Group();
    const cyl = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 2.2, 8), new THREE.MeshBasicMaterial({color}));
    cyl.position.y = 1.1; g.add(cyl);
    const cone = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.45, 8), new THREE.MeshBasicMaterial({color}));
    cone.position.y = 2.45; g.add(cone);
    if (dir === 'x') g.rotation.z = -Math.PI / 2;
    if (dir === 'z') g.rotation.x = Math.PI / 2;
    return g;
  };
  axes.add(mkA('x', 0xd32f2f));
  axes.add(mkA('y', 0x2e7d32));
  axes.add(mkA('z', 0x1565c0));
  axes.position.set(-30, 0.1, -30);
  scene.add(axes);

  // arm + ghost + tip marker
  const arm = buildArm(1.0);
  scene.add(arm.root);
  const ghost = buildArm(0.28);
  ghost.root.visible = false;
  scene.add(ghost.root);

  const tipMarker = new THREE.Mesh(
    new THREE.SphereGeometry(0.7, 24, 24),
    new THREE.MeshBasicMaterial({ color: 0xff5722 })
  );
  scene.add(tipMarker);
  const tipMarkerOutline = new THREE.Mesh(
    new THREE.SphereGeometry(0.85, 24, 24),
    new THREE.MeshBasicMaterial({ color: 0x0a0a0a, wireframe: true, wireframeLinewidth: 1 })
  );
  scene.add(tipMarkerOutline);

  const targetMarker = new THREE.Mesh(
    new THREE.SphereGeometry(0.55, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0x0a0a0a })
  );
  targetMarker.visible = false;
  scene.add(targetMarker);
  // dashed verticle line from target to floor
  const lineMat = new THREE.LineDashedMaterial({ color: 0x0a0a0a, dashSize: 0.5, gapSize: 0.3 });
  const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
  const targetLine = new THREE.Line(lineGeo, lineMat);
  targetLine.computeLineDistances();
  targetLine.visible = false;
  scene.add(targetLine);

  // Predicted catch path display
  const pathPts = [];
  const pathGeo = new THREE.BufferGeometry();
  const pathMat = new THREE.LineBasicMaterial({ color: 0xff5722, linewidth: 2 });
  const pathLine = new THREE.Line(pathGeo, pathMat);
  scene.add(pathLine);

  // workspace sphere
  const wsGeo = new THREE.SphereGeometry(REACH, 32, 16);
  const wsMat = new THREE.MeshBasicMaterial({ color: 0x1565c0, wireframe: true, opacity: 0.08, transparent: true });
  const ws = new THREE.Mesh(wsGeo, wsMat);
  ws.position.y = SHLD_OFF;
  ws.visible = false;
  scene.add(ws);

  // ---------------------------------------------------------------------
  // CAM MOUNT (small box+lens, sits right of base) — always visible
  // World coords: (CAM_WORLD.x, CAM_WORLD.y, CAM_WORLD.z) inches
  // Three.js mapping: scene_x=world_x, scene_y=world_z, scene_z=-world_y
  // ---------------------------------------------------------------------
  const camGroup = new THREE.Group();
  const camBodyMat = new THREE.MeshStandardMaterial({ color: 0x141414, roughness: 0.7, metalness: 0.1 });
  const camLensMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.3, metalness: 0.4 });
  const camPostMat = new THREE.MeshStandardMaterial({ color: 0x9a9a9a, roughness: 0.5, metalness: 0.3 });
  const camUsbMat  = new THREE.MeshStandardMaterial({ color: 0xb0b0b0, roughness: 0.3, metalness: 0.7 });
  // Body: ~1.5" cube
  const camBody = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.0, 1.4), camBodyMat);
  camBody.position.y = CAM_WORLD.z + 0.5;
  camGroup.add(camBody);
  // Lens: short cylinder pointing UP
  const camLens = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.4, 0.5, 16), camLensMat);
  camLens.position.y = CAM_WORLD.z + 1.25;
  camGroup.add(camLens);
  // USB port nub on -X face (toward arm). Visual confirmation of orientation.
  const camUsb = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.4, 0.55), camUsbMat);
  camUsb.position.set(-0.93, CAM_WORLD.z + 0.4, 0);
  camGroup.add(camUsb);
  // Mount post down to ground
  const camPostH = Math.max(0.1, CAM_WORLD.z);
  if (camPostH > 0.05) {
    const camPost = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, camPostH, 10), camPostMat);
    camPost.position.y = camPostH / 2;
    camGroup.add(camPost);
  }
  // Position the whole group at world (CAM_WORLD.x, _, -CAM_WORLD.y)
  camGroup.position.set(CAM_WORLD.x, 0, -CAM_WORLD.y);
  // Label hash above the cam: a small text-y crosshair
  const camTickMat = new THREE.LineBasicMaterial({ color: 0x0a0a0a });
  const camTickGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-0.6, CAM_WORLD.z + 1.7, 0),
    new THREE.Vector3( 0.6, CAM_WORLD.z + 1.7, 0),
    new THREE.Vector3(0, CAM_WORLD.z + 1.4, 0),
    new THREE.Vector3(0, CAM_WORLD.z + 2.0, 0),
  ]);
  const camTick = new THREE.LineSegments(camTickGeo, camTickMat);
  camGroup.add(camTick);
  scene.add(camGroup);

  // FOV cone wireframe pointing up from the cam
  const fovHalfRad = (CAM_FOV_DEG * Math.PI / 180) / 2;
  const fovRadius = CAM_FOV_HEIGHT * Math.tan(fovHalfRad);
  const fovGeo = new THREE.ConeGeometry(fovRadius, CAM_FOV_HEIGHT, 24, 1, true);
  const fovMat = new THREE.MeshBasicMaterial({ color: 0x1565c0, wireframe: true, opacity: 0.18, transparent: true });
  const fovCone = new THREE.Mesh(fovGeo, fovMat);
  // Cone in Three.js opens DOWN by default. Rotate to point UP. Apex at lens.
  fovCone.rotation.x = Math.PI;
  // Center of cone is at half-height up from apex; with rotation flipping it,
  // center sits ABOVE the apex by half-height. Apex at lens top => center at
  // (CAM_WORLD.z + 1.5) + CAM_FOV_HEIGHT/2.
  fovCone.position.set(CAM_WORLD.x, CAM_WORLD.z + 1.5 + CAM_FOV_HEIGHT / 2, -CAM_WORLD.y);
  fovCone.visible = false;
  scene.add(fovCone);

  // Drone marker: small sphere with a tiny "shadow" line down to floor
  const droneGroup = new THREE.Group();
  const droneSphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.55, 18, 18),
    new THREE.MeshBasicMaterial({ color: 0x1565c0 })
  );
  droneGroup.add(droneSphere);
  const droneOutline = new THREE.Mesh(
    new THREE.SphereGeometry(0.7, 18, 18),
    new THREE.MeshBasicMaterial({ color: 0x0a0a0a, wireframe: true })
  );
  droneGroup.add(droneOutline);
  // Drone shadow line (vertical to floor)
  const droneShadowMat = new THREE.LineDashedMaterial({ color: 0x1565c0, dashSize: 0.4, gapSize: 0.25, opacity: 0.7, transparent: true });
  const droneShadowGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
  const droneShadow = new THREE.Line(droneShadowGeo, droneShadowMat);
  scene.add(droneShadow);
  droneGroup.visible = false;
  droneShadow.visible = false;
  scene.add(droneGroup);

  // Drone trail (single Line, rebuilt each frame from a points buffer)
  const trailGeo = new THREE.BufferGeometry();
  trailGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(TRAIL_MAX * 3), 3));
  const trailMat = new THREE.LineBasicMaterial({ color: 0x1565c0, opacity: 0.5, transparent: true });
  const droneTrail = new THREE.Line(trailGeo, trailMat);
  droneTrail.visible = false;
  scene.add(droneTrail);

  return {
    scene, camera, renderer, arm, ghost,
    tipMarker, tipMarkerOutline, targetMarker, targetLine, pathLine,
    workspaceSphere: ws,
    camGroup, fovCone, droneGroup, droneShadow, droneTrail,
  };
}

// ============================================================================
// MAIN VIEWER (with drag-tip interaction + camera controls)
// ============================================================================
function Viewer({ angles, targetXYZ, setTargetXYZ, onCommit, viewMode, showWorkspace, catchPath, dronePos, droneTrail, showCamFov }) {
  const mountRef = useRef(null);
  const stateRef = useRef({});

  useEffect(() => {
    const mount = mountRef.current;
    if (!mount) return;

    if (viewMode === 'multi') {
      // Three side-by-side mini scenes
      const subDivs = ['front','top','iso'].map(label => {
        const div = document.createElement('div');
        div.style.cssText = 'flex:1;border-right:1px solid #0a0a0a;position:relative;min-width:0;';
        const tag = document.createElement('div');
        tag.textContent = label.toUpperCase();
        tag.style.cssText = 'position:absolute;top:8px;left:8px;font-family:IBM Plex Mono,monospace;font-size:9px;letter-spacing:0.16em;font-weight:700;color:#0a0a0a;background:#f4f1e8;padding:2px 6px;border:1px solid #0a0a0a;z-index:10;';
        div.appendChild(tag);
        mount.appendChild(div);
        return { label, div };
      });
      // remove last border
      subDivs[subDivs.length-1].div.style.borderRight = '0';
      mount.style.cssText = 'display:flex;width:100%;height:100%;background:#f4f1e8;';

      const subs = subDivs.map(({label, div}) => {
        const built = buildScene(div);
        // configure camera per view
        if (label === 'front') {
          built.camera.position.set(0, 14, 60);
        } else if (label === 'top') {
          built.camera.position.set(0, 90, 0.01);
        } else { // iso
          built.camera.position.set(45, 38, 45);
        }
        built.camera.lookAt(0, 14, 0);
        return { ...built, label, div };
      });

      let raf;
      const tick = () => {
        const a = stateRef.current.angles;
        const t = stateRef.current.targetXYZ;
        const ws = stateRef.current.showWorkspace;
        for (const s of subs) {
          if (a) {
            s.arm.setAngles(a.b, a.s, a.e);
            const tip = fk(a.b, a.s, a.e);
            s.tipMarker.position.set(tip.x, tip.z, -tip.y);
            s.tipMarkerOutline.position.copy(s.tipMarker.position);
          }
          if (t) {
            const r = ik(t.x, t.y, t.z);
            if (r.ok) {
              s.ghost.root.visible = true;
              s.ghost.setAngles(r.b, r.s, r.e);
            } else { s.ghost.root.visible = false; }
            s.targetMarker.visible = true;
            s.targetMarker.position.set(t.x, t.z, -t.y);
            const pos = s.targetLine.geometry.attributes.position;
            pos.setXYZ(0, t.x, 0, -t.y);
            pos.setXYZ(1, t.x, t.z, -t.y);
            pos.needsUpdate = true;
            s.targetLine.visible = true;
            s.targetLine.computeLineDistances();
          } else {
            s.ghost.root.visible = false;
            s.targetMarker.visible = false;
            s.targetLine.visible = false;
          }
          s.workspaceSphere.visible = !!ws;
          // Drone marker + trail (multi-view)
          const dp = stateRef.current.dronePos;
          const trail = stateRef.current.droneTrail || [];
          const showFov = stateRef.current.showCamFov;
          s.fovCone.visible = !!showFov;
          if (dp) {
            s.droneGroup.position.set(dp.x, dp.z, -dp.y);
            s.droneGroup.visible = true;
            // Vertical shadow line
            const sp = s.droneShadow.geometry.attributes.position;
            sp.setXYZ(0, dp.x, 0, -dp.y);
            sp.setXYZ(1, dp.x, dp.z, -dp.y);
            sp.needsUpdate = true;
            s.droneShadow.computeLineDistances();
            s.droneShadow.visible = true;
          } else {
            s.droneGroup.visible = false;
            s.droneShadow.visible = false;
          }
          if (trail.length >= 2) {
            const ta = s.droneTrail.geometry.attributes.position;
            const N = Math.min(trail.length, TRAIL_MAX);
            for (let i = 0; i < N; i++) {
              const p = trail[trail.length - N + i];
              ta.setXYZ(i, p.x, p.z, -p.y);
            }
            s.droneTrail.geometry.setDrawRange(0, N);
            ta.needsUpdate = true;
            s.droneTrail.visible = true;
          } else {
            s.droneTrail.visible = false;
          }
          s.renderer.render(s.scene, s.camera);
        }
        raf = requestAnimationFrame(tick);
      };
      tick();

      const onResize = () => {
        for (const s of subs) {
          const w = s.div.clientWidth, h = s.div.clientHeight;
          s.renderer.setSize(w, h);
          s.camera.aspect = w / h;
          s.camera.updateProjectionMatrix();
        }
      };
      window.addEventListener('resize', onResize);

      stateRef.current.dispose = () => {
        cancelAnimationFrame(raf);
        window.removeEventListener('resize', onResize);
        for (const s of subs) {
          s.renderer.dispose();
          if (s.div.parentNode === mount) mount.removeChild(s.div);
        }
      };
      return () => stateRef.current.dispose?.();
    }

    // Single view
    const built = buildScene(mount);
    const { scene, camera, renderer, arm, ghost, tipMarker, tipMarkerOutline, targetMarker, targetLine, pathLine, workspaceSphere, camGroup, fovCone, droneGroup, droneShadow, droneTrail } = built;

    const cam = { az: -Math.PI / 4, el: Math.PI / 5.5, dist: 78, target: new THREE.Vector3(0, 14, 0) };
    function updateCam() {
      camera.position.x = cam.target.x + cam.dist * Math.cos(cam.el) * Math.cos(cam.az);
      camera.position.z = cam.target.z + cam.dist * Math.cos(cam.el) * Math.sin(cam.az);
      camera.position.y = cam.target.y + cam.dist * Math.sin(cam.el);
      camera.lookAt(cam.target);
    }
    updateCam();

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let orbiting = false, dragging = false, dragZ = 22, hoverTip = false;
    let orbitStart = null;

    function ndc(e) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    }
    function planeHit(yLevel) {
      raycaster.setFromCamera(mouse, camera);
      const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -yLevel);
      const pt = new THREE.Vector3();
      const ok = raycaster.ray.intersectPlane(plane, pt);
      return ok ? pt : null;
    }

    const onDown = (e) => {
      if (e.button !== 0) return;
      ndc(e);
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(tipMarker);
      if (hits.length > 0) {
        dragging = true;
        dragZ = tipMarker.position.y;
        stateRef.current.onDragStart?.();
        renderer.domElement.style.cursor = 'grabbing';
      } else {
        orbiting = true;
        orbitStart = { x: e.clientX, y: e.clientY, az: cam.az, el: cam.el };
        renderer.domElement.style.cursor = 'grabbing';
      }
    };
    const onMove = (e) => {
      ndc(e);
      if (dragging) {
        const pt = planeHit(dragZ);
        if (pt) stateRef.current.onDragMove?.({ x: pt.x, y: -pt.z, z: dragZ });
      } else if (orbiting) {
        cam.az = orbitStart.az - (e.clientX - orbitStart.x) * 0.008;
        cam.el = Math.max(0.05, Math.min(Math.PI / 2 - 0.05, orbitStart.el + (e.clientY - orbitStart.y) * 0.008));
        updateCam();
      } else {
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObject(tipMarker);
        const nh = hits.length > 0;
        if (nh !== hoverTip) {
          hoverTip = nh;
          renderer.domElement.style.cursor = nh ? 'grab' : 'default';
          tipMarker.scale.setScalar(nh ? 1.3 : 1.0);
          tipMarkerOutline.scale.setScalar(nh ? 1.3 : 1.0);
        }
      }
    };
    const onUp = () => {
      if (dragging) { stateRef.current.onDragEnd?.(); dragging = false; }
      orbiting = false;
      renderer.domElement.style.cursor = hoverTip ? 'grab' : 'default';
    };
    const onWheel = (e) => {
      e.preventDefault();
      if (dragging) {
        dragZ = Math.max(Z_FLOOR + 0.5, Math.min(REACH + SHLD_OFF, dragZ - e.deltaY * 0.02));
        const pt = planeHit(dragZ);
        if (pt) stateRef.current.onDragMove?.({ x: pt.x, y: -pt.z, z: dragZ });
      } else {
        cam.dist = Math.max(25, Math.min(150, cam.dist + e.deltaY * 0.12));
        updateCam();
      }
    };
    renderer.domElement.addEventListener('mousedown', onDown);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    renderer.domElement.addEventListener('wheel', onWheel, { passive: false });

    const onResize = () => {
      const w = mount.clientWidth, h = mount.clientHeight;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    };
    window.addEventListener('resize', onResize);

    let raf;
    const tick = () => {
      const s = stateRef.current;
      if (s.angles) {
        arm.setAngles(s.angles.b, s.angles.s, s.angles.e);
        const t = fk(s.angles.b, s.angles.s, s.angles.e);
        tipMarker.position.set(t.x, t.z, -t.y);
        tipMarkerOutline.position.copy(tipMarker.position);
      }
      if (s.targetXYZ) {
        const r = ik(s.targetXYZ.x, s.targetXYZ.y, s.targetXYZ.z);
        if (r.ok) { ghost.root.visible = true; ghost.setAngles(r.b, r.s, r.e); }
        else ghost.root.visible = false;
        targetMarker.visible = true;
        targetMarker.position.set(s.targetXYZ.x, s.targetXYZ.z, -s.targetXYZ.y);
        const pos = targetLine.geometry.attributes.position;
        pos.setXYZ(0, s.targetXYZ.x, 0, -s.targetXYZ.y);
        pos.setXYZ(1, s.targetXYZ.x, s.targetXYZ.z, -s.targetXYZ.y);
        pos.needsUpdate = true;
        targetLine.visible = true;
        targetLine.computeLineDistances();
      } else {
        ghost.root.visible = false;
        targetMarker.visible = false;
        targetLine.visible = false;
      }
      workspaceSphere.visible = !!s.showWorkspace;

      // Drone marker + trail + FOV cone (single view)
      fovCone.visible = !!s.showCamFov;
      const dp = s.dronePos;
      if (dp) {
        droneGroup.position.set(dp.x, dp.z, -dp.y);
        droneGroup.visible = true;
        const sp = droneShadow.geometry.attributes.position;
        sp.setXYZ(0, dp.x, 0, -dp.y);
        sp.setXYZ(1, dp.x, dp.z, -dp.y);
        sp.needsUpdate = true;
        droneShadow.computeLineDistances();
        droneShadow.visible = true;
      } else {
        droneGroup.visible = false;
        droneShadow.visible = false;
      }
      const trail = s.droneTrail || [];
      if (trail.length >= 2) {
        const ta = droneTrail.geometry.attributes.position;
        const N = Math.min(trail.length, TRAIL_MAX);
        for (let i = 0; i < N; i++) {
          const p = trail[trail.length - N + i];
          ta.setXYZ(i, p.x, p.z, -p.y);
        }
        droneTrail.geometry.setDrawRange(0, N);
        ta.needsUpdate = true;
        droneTrail.visible = true;
      } else {
        droneTrail.visible = false;
      }

      // catch path
      if (s.catchPath && s.catchPath.length > 1) {
        const pts = [];
        for (const p of s.catchPath) pts.push(new THREE.Vector3(p.x, p.z, -p.y));
        pathLine.geometry.dispose();
        pathLine.geometry = new THREE.BufferGeometry().setFromPoints(pts);
        pathLine.visible = true;
      } else {
        pathLine.visible = false;
      }

      renderer.render(scene, camera);
      raf = requestAnimationFrame(tick);
    };
    tick();

    stateRef.current.dispose = () => {
      cancelAnimationFrame(raf);
      renderer.domElement.removeEventListener('mousedown', onDown);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      renderer.domElement.removeEventListener('wheel', onWheel);
      window.removeEventListener('resize', onResize);
      renderer.dispose();
      if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
    };
    return () => stateRef.current.dispose?.();
  }, [viewMode]);

  // sync props every render
  useEffect(() => {
    stateRef.current.angles = angles;
    stateRef.current.targetXYZ = targetXYZ;
    stateRef.current.showWorkspace = showWorkspace;
    stateRef.current.catchPath = catchPath;
    stateRef.current.dronePos = dronePos;
    stateRef.current.droneTrail = droneTrail;
    stateRef.current.showCamFov = showCamFov;
    stateRef.current.onDragStart = () => {
      const t = fk(angles.b, angles.s, angles.e);
      setTargetXYZ({ x: t.x, y: t.y, z: t.z });
    };
    stateRef.current.onDragMove = (p) => setTargetXYZ(p);
    stateRef.current.onDragEnd = () => {
      if (stateRef.current.targetXYZ) onCommit(stateRef.current.targetXYZ);
    };
  });

  return <div ref={mountRef} style={{ width: '100%', height: '100%', position: 'relative', background: '#f4f1e8' }} />;
}

// ============================================================================
// SERIAL HOOK
// ============================================================================
function useSerial({ onLine, onTelemetry, onRaw, resetOnOpen = false }) {
  const [connected, setConnected] = useState(false);
  const [error, setError] = useState(null);
  const portRef = useRef(null);
  const writerRef = useRef(null);
  const readerRef = useRef(null);
  const buf = useRef('');
  const keep = useRef(false);
  const onLineR = useRef(onLine);
  const onTelR = useRef(onTelemetry);
  const onRawR = useRef(onRaw);
  useEffect(() => { onLineR.current = onLine; onTelR.current = onTelemetry; onRawR.current = onRaw; }, [onLine, onTelemetry, onRaw]);

  const connect = useCallback(async () => {
    if (!('serial' in navigator)) {
      setError('WebSerial not supported. Use Chrome, Edge, or Brave.');
      return;
    }
    try {
      const port = await navigator.serial.requestPort();
      await port.open({ baudRate: 115200 });
      portRef.current = port;

      // ESP32-CAM-MB and similar CH340-based boards have an auto-reset circuit
      // where DTR drives EN (reset) and RTS drives GPIO0 (boot mode select).
      // GPIO0 LOW at reset = bootloader (waiting for download).
      // GPIO0 HIGH at reset = run program normally.
      //
      // Web Serial defaults to RTS asserted (line LOW), which pulls GPIO0 low
      // and traps the chip in bootloader. We need: assert DTR (EN low = held
      // in reset), de-assert RTS (GPIO0 high = run mode), then release DTR.
      //
      // Sequence (note: setSignals true = line driven LOW for DTR/RTS):
      //   1. DTR=true,  RTS=false  -> chip held in reset, GPIO0 high
      //   2. wait
      //   3. DTR=false, RTS=false  -> release reset with GPIO0 still high -> RUN
      if (resetOnOpen) {
        try {
          // Make sure we're not stuck in bootloader. Force RTS deasserted.
          await port.setSignals({ dataTerminalReady: false, requestToSend: false });
          await new Promise(r => setTimeout(r, 50));
          // Hold reset, GPIO0 high
          await port.setSignals({ dataTerminalReady: true,  requestToSend: false });
          await new Promise(r => setTimeout(r, 100));
          // Release reset with GPIO0 still high -> normal boot
          await port.setSignals({ dataTerminalReady: false, requestToSend: false });
          await new Promise(r => setTimeout(r, 50));
        } catch (e) {
          setError(`reset failed: ${e.message}`);
        }
      }

      const dec = new TextDecoderStream();
      port.readable.pipeTo(dec.writable).catch(() => {});
      const reader = dec.readable.getReader();
      readerRef.current = reader;
      keep.current = true;
      const enc = new TextEncoderStream();
      enc.readable.pipeTo(port.writable).catch(() => {});
      writerRef.current = enc.writable.getWriter();
      setConnected(true); setError(null);
      (async () => {
        try {
          while (keep.current) {
            const { value, done } = await reader.read();
            if (done) break;
            onRawR.current?.(value);
            buf.current += value;
            let idx;
            while ((idx = buf.current.indexOf('\n')) >= 0) {
              const line = buf.current.slice(0, idx).replace(/\r$/, '');
              buf.current = buf.current.slice(idx + 1);
              if (line.startsWith('$T,')) onTelR.current?.(line);
              else if (line.length > 0) onLineR.current?.(line);
            }
          }
        } catch (e) { setError(e.message); }
      })();
    } catch (e) { setError(e.message); }
  }, [resetOnOpen]);

  const disconnect = useCallback(async () => {
    keep.current = false;
    try { await readerRef.current?.cancel(); } catch {}
    try { await writerRef.current?.close(); } catch {}
    try { await portRef.current?.close(); } catch {}
    readerRef.current = null; writerRef.current = null; portRef.current = null;
    setConnected(false);
  }, []);

  const send = useCallback(async (s) => {
    if (!writerRef.current) return false;
    try { await writerRef.current.write(s); return true; }
    catch (e) { setError(e.message); return false; }
  }, []);

  const pulseReset = useCallback(async () => {
    const port = portRef.current;
    if (!port) return false;
    try {
      // Same proper sequence as resetOnOpen above:
      // RTS de-asserted (GPIO0 high) the whole time, DTR pulsed (EN reset)
      await port.setSignals({ dataTerminalReady: false, requestToSend: false });
      await new Promise(r => setTimeout(r, 30));
      await port.setSignals({ dataTerminalReady: true,  requestToSend: false });
      await new Promise(r => setTimeout(r, 100));
      await port.setSignals({ dataTerminalReady: false, requestToSend: false });
      return true;
    } catch (e) { setError(e.message); return false; }
  }, []);

  // Release both control lines. Use this if the chip is held in reset and a
  // pulseReset doesn't seem to do anything - the polarity might be opposite
  // on some boards, in which case just letting the lines float is what works.
  const releaseSignals = useCallback(async () => {
    const port = portRef.current;
    if (!port) return false;
    try {
      await port.setSignals({ dataTerminalReady: false, requestToSend: false });
      return true;
    } catch (e) { setError(e.message); return false; }
  }, []);

  return { connected, error, connect, disconnect, send, pulseReset, releaseSignals };
}

// ============================================================================
// GAMEPAD HOOK
// ============================================================================
function useGamepad({ enabled, onAction }) {
  const lastBtn = useRef({});
  const lastAxisAction = useRef(0);
  const onActionR = useRef(onAction);
  useEffect(() => { onActionR.current = onAction; }, [onAction]);

  useEffect(() => {
    if (!enabled) return;
    let raf;
    const tick = () => {
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      const pad = pads[0];
      if (pad) {
        // Buttons
        for (let i = 0; i < pad.buttons.length; i++) {
          const pressed = pad.buttons[i].pressed;
          const was = lastBtn.current[i] || false;
          if (pressed && !was) onActionR.current?.({ type: 'btn', i });
          lastBtn.current[i] = pressed;
        }
        // Axes (sticks + triggers)
        const axes = pad.axes;
        const now = performance.now();
        if (now - lastAxisAction.current > 80) {
          // call axis callback periodically
          onActionR.current?.({ type: 'axes', axes: Array.from(axes), buttons: pad.buttons.map(b => b.value) });
          lastAxisAction.current = now;
        }
      }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [enabled]);
}

function AngleBar({ label, value, min, max, target, forbid }) {
  const pct = (v) => ((v - min) / (max - min)) * 100;
  const fillPct = Math.max(0, Math.min(100, pct(value)));
  const cPct = pct(0);
  return (
    <div style={{ marginBottom: 12 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 4 }}>
        <span className="label label-strong">{label}</span>
        <span className="mono tabular" style={{ fontSize: 13, fontWeight: 700 }}>
          {value >= 0 ? '+' : ''}{value.toFixed(1)}°
        </span>
      </div>
      <div className="tbar">
        {forbid && (
          <div className="forbid" style={{ left: `${pct(forbid[0])}%`, width: `${pct(forbid[1]) - pct(forbid[0])}%` }} />
        )}
        <div className="center" style={{ left: `${cPct}%` }} />
        <div className="fill" style={{
          left: `${Math.min(cPct, fillPct)}%`,
          width: `${Math.abs(fillPct - cPct)}%`,
        }} />
        {target !== undefined && target !== null && !isNaN(target) && (
          <div className="target" style={{ left: `${Math.max(0, Math.min(100, pct(target)))}%` }} />
        )}
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 2 }}>
        <span className="mono" style={{ fontSize: 9, color: 'var(--grey-1)' }}>{min}</span>
        <span className="mono" style={{ fontSize: 9, color: 'var(--grey-1)' }}>0</span>
        <span className="mono" style={{ fontSize: 9, color: 'var(--grey-1)' }}>+{max}</span>
      </div>
    </div>
  );
}

function SectionHeader({ num, title, right }) {

        <span className="title">{title}</span>

}

function CamSendInput({ onSend }) {
  const [val, setVal] = useState('');
  const submit = () => {
    if (!val) return;
    onSend?.(val);
    setVal('');

  return (

        type="text"
        value={val}
        onChange={(e) => setVal(e.target.value)}
