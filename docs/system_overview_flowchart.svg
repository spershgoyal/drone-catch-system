<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="1800" viewBox="0 0 3200 1800">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .lane { fill: #ffffff; stroke: #000000; stroke-width: 3; }
      .box { fill: #ffffff; stroke: #000000; stroke-width: 4; rx: 12; ry: 12; }
      .line { fill: none; stroke: #000000; stroke-width: 4; }
      .dash { fill: none; stroke: #000000; stroke-width: 3; stroke-dasharray: 16 12; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 46px; font-weight: 700; fill: #000000; }
      .laneLabel { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #000000; }
      .ref { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; fill: #000000; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 28px; fill: #000000; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 22px; fill: #000000; }
    </style>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="12" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#000000"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="3200" height="1800"/>
  <text class="title" x="70" y="70">Drone Catch System - Detailed Whole-System Flowchart</text>

  <!-- lanes -->
  <rect class="lane" x="60" y="120" width="3080" height="260"/>
  <rect class="lane" x="60" y="380" width="3080" height="330"/>
  <rect class="lane" x="60" y="710" width="3080" height="380"/>
  <rect class="lane" x="60" y="1090" width="3080" height="300"/>
  <rect class="lane" x="60" y="1390" width="3080" height="330"/>

  <text class="laneLabel" x="90" y="160">1. Target and Environment</text>
  <text class="laneLabel" x="90" y="420">2. Sensing and Data Sources</text>
  <text class="laneLabel" x="90" y="750">3. Host Compute and Decision Layer</text>
  <text class="laneLabel" x="90" y="1130">4. Real-Time Controllers</text>
  <text class="laneLabel" x="90" y="1430">5. Physical Outputs and Feedback</text>

  <!-- lane 1 -->
  <rect class="box" x="180" y="200" width="420" height="110"/>
  <text class="ref" x="210" y="240">A1</text>
  <text class="label" x="210" y="285">Drone with UWB tag and visual marker</text>

  <rect class="box" x="820" y="200" width="420" height="110"/>
  <text class="ref" x="850" y="240">A2</text>
  <text class="label" x="850" y="285">Boat motion, lighting, clutter, wind</text>

  <!-- lane 2 -->
  <rect class="box" x="180" y="470" width="420" height="120"/>
  <text class="ref" x="210" y="510">B1</text>
  <text class="label" x="210" y="555">ESP32-CAM firmware</text>
  <text class="small" x="210" y="585">captures frames and streams image source</text>

  <rect class="box" x="760" y="470" width="480" height="120"/>
  <text class="ref" x="790" y="510">B2</text>
  <text class="label" x="790" y="555">3 base anchors + 1 tip anchor</text>
  <text class="small" x="790" y="585">poll drone tag and return serial range data</text>

  <rect class="box" x="1390" y="470" width="430" height="120"/>
  <text class="ref" x="1420" y="510">B3</text>
  <text class="label" x="1420" y="555">Arm sensors and IMU</text>
  <text class="small" x="1420" y="585">pots, wrist state, BNO08x, arm telemetry</text>

  <rect class="box" x="1990" y="470" width="430" height="120"/>
  <text class="ref" x="2020" y="510">B4</text>
  <text class="label" x="2020" y="555">Operator inputs</text>
  <text class="small" x="2020" y="585">web UI, commands, tuning, manual override</text>

  <!-- lane 3 -->
  <rect class="box" x="160" y="820" width="450" height="150"/>
  <text class="ref" x="190" y="860">C1</text>
  <text class="label" x="190" y="905">Host vision tracker CLI</text>
  <text class="small" x="190" y="940">opens camera source and UWB serial links</text>

  <rect class="box" x="740" y="820" width="470" height="150"/>
  <text class="ref" x="770" y="860">C2</text>
  <text class="label" x="770" y="905">Black-target detector</text>
  <text class="small" x="770" y="940">threshold, morphology, contour selection</text>

  <rect class="box" x="1340" y="820" width="520" height="150"/>
  <text class="ref" x="1370" y="860">C3</text>
  <text class="label" x="1370" y="905">Bearing + fusion engine</text>
  <text class="small" x="1370" y="940">UWB trilateration, hybrid solve, vision fallback</text>

  <rect class="box" x="2000" y="820" width="500" height="150"/>
  <text class="ref" x="2030" y="860">C4</text>
  <text class="label" x="2030" y="905">Target state output</text>
  <text class="small" x="2030" y="940">position, residual, source, capture_ready</text>

  <rect class="box" x="2600" y="820" width="420" height="150"/>
  <text class="ref" x="2630" y="860">C5</text>
  <text class="label" x="2630" y="905">Operator monitoring and decisions</text>
  <text class="small" x="2630" y="940">accept / retune / abort / command catch</text>

  <!-- lane 4 -->
  <rect class="box" x="180" y="1180" width="500" height="130"/>
  <text class="ref" x="210" y="1220">D1</text>
  <text class="label" x="210" y="1265">Web control UI</text>
  <text class="small" x="210" y="1295">serial console, telemetry parser, target commands</text>

  <rect class="box" x="860" y="1180" width="620" height="130"/>
  <text class="ref" x="890" y="1220">D2</text>
  <text class="label" x="890" y="1265">Teensy arm firmware v4</text>
  <text class="small" x="890" y="1295">main loop: sensors, UWB, safety, trajectory, catch FSM</text>

  <rect class="box" x="1660" y="1180" width="500" height="130"/>
  <text class="ref" x="1690" y="1220">D3</text>
  <text class="label" x="1690" y="1265">Hand controller interface</text>
  <text class="small" x="1690" y="1295">host sends serial pose / grasp commands to Nano</text>

  <rect class="box" x="2330" y="1180" width="500" height="130"/>
  <text class="ref" x="2360" y="1220">D4</text>
  <text class="label" x="2360" y="1265">Arduino Nano hand firmware</text>
  <text class="small" x="2360" y="1295">line parser, per-servo targets, motion stepping</text>

  <!-- lane 5 -->
  <rect class="box" x="160" y="1495" width="520" height="130"/>
  <text class="ref" x="190" y="1535">E1</text>
  <text class="label" x="190" y="1580">Arm actuation</text>
  <text class="small" x="190" y="1610">base, shoulder, elbow, wrist, magnet</text>

  <rect class="box" x="880" y="1495" width="540" height="130"/>
  <text class="ref" x="910" y="1535">E2</text>
  <text class="label" x="910" y="1580">Hand actuation</text>
  <text class="small" x="910" y="1610">thumb, index, middle, ring, pinky servos</text>

  <rect class="box" x="1650" y="1495" width="620" height="130"/>
  <text class="ref" x="1680" y="1535">E3</text>
  <text class="label" x="1680" y="1580">Physical catch result</text>
  <text class="small" x="1680" y="1610">drone tracked, approached, captured, or aborted</text>

  <rect class="box" x="2470" y="1495" width="500" height="130"/>
  <text class="ref" x="2500" y="1535">E4</text>
  <text class="label" x="2500" y="1580">Telemetry and retry loop</text>
  <text class="small" x="2500" y="1610">status returns to host and operator for next action</text>

  <!-- arrows -->
  <line class="line" x1="600" y1="255" x2="820" y2="255" marker-end="url(#arrow)"/>
  <line class="line" x1="390" y1="310" x2="390" y2="470" marker-end="url(#arrow)"/>
  <line class="line" x1="1030" y1="310" x2="1030" y2="470" marker-end="url(#arrow)"/>

  <line class="line" x1="600" y1="530" x2="760" y2="530" marker-end="url(#arrow)"/>
  <line class="line" x1="1240" y1="530" x2="1390" y2="530" marker-end="url(#arrow)"/>
  <line class="line" x1="1820" y1="530" x2="2000" y2="530" marker-end="url(#arrow)"/>

  <line class="line" x1="390" y1="590" x2="390" y2="820" marker-end="url(#arrow)"/>
  <line class="line" x1="1000" y1="590" x2="1000" y2="820" marker-end="url(#arrow)"/>
  <line class="dash" x1="1605" y1="590" x2="1605" y2="820" marker-end="url(#arrow)"/>
  <line class="dash" x1="2205" y1="590" x2="2205" y2="820" marker-end="url(#arrow)"/>

  <line class="line" x1="610" y1="895" x2="740" y2="895" marker-end="url(#arrow)"/>
  <line class="line" x1="1210" y1="895" x2="1340" y2="895" marker-end="url(#arrow)"/>
  <line class="line" x1="1860" y1="895" x2="2000" y2="895" marker-end="url(#arrow)"/>
  <line class="line" x1="2500" y1="895" x2="2600" y2="895" marker-end="url(#arrow)"/>

  <line class="line" x1="2250" y1="970" x2="2250" y2="1180" marker-end="url(#arrow)"/>
  <line class="line" x1="400" y1="970" x2="400" y2="1180" marker-end="url(#arrow)"/>
  <line class="line" x1="1600" y1="970" x2="1170" y2="1180" marker-end="url(#arrow)"/>

  <line class="line" x1="680" y1="1245" x2="860" y2="1245" marker-end="url(#arrow)"/>
  <line class="line" x1="1480" y1="1245" x2="1660" y2="1245" marker-end="url(#arrow)"/>
  <line class="line" x1="2160" y1="1245" x2="2330" y2="1245" marker-end="url(#arrow)"/>

  <line class="line" x1="430" y1="1310" x2="430" y2="1495" marker-end="url(#arrow)"/>
  <line class="line" x1="2580" y1="1310" x2="1150" y2="1495" marker-end="url(#arrow)"/>

  <line class="line" x1="680" y1="1560" x2="880" y2="1560" marker-end="url(#arrow)"/>
  <line class="line" x1="1420" y1="1560" x2="1650" y2="1560" marker-end="url(#arrow)"/>
  <line class="line" x1="2270" y1="1560" x2="2470" y2="1560" marker-end="url(#arrow)"/>

  <line class="dash" x1="2720" y1="1495" x2="2720" y2="970" marker-end="url(#arrow)"/>
  <line class="dash" x1="2470" y1="1560" x2="520" y2="1560" marker-end="url(#arrow)"/>
</svg>
