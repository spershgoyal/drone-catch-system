<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="1300" viewBox="0 0 3600 1300">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #ffffff; stroke: #000000; stroke-width: 4; rx: 14; ry: 14; }
      .group { fill: #ffffff; stroke: #000000; stroke-width: 3; }
      .line { fill: none; stroke: #000000; stroke-width: 4; }
      .dash { fill: none; stroke: #000000; stroke-width: 3; stroke-dasharray: 14 10; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 44px; font-weight: 700; fill: #000000; }
      .section { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; fill: #000000; }
      .ref { font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; fill: #000000; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 30px; fill: #000000; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 22px; fill: #000000; }
    </style>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="12" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#000000"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="3600" height="1300"/>
  <text class="title" x="70" y="70">Drone Catch System - Whole-System Flowchart</text>

  <!-- top group -->
  <rect class="group" x="50" y="120" width="3500" height="470"/>
  <text class="section" x="80" y="160">Main sensing and decision path</text>

  <!-- bottom group -->
  <rect class="group" x="50" y="650" width="3500" height="560"/>
  <text class="section" x="80" y="690">Control, actuation, and feedback path</text>

  <!-- top row -->
  <rect class="box" x="120" y="240" width="380" height="170"/>
  <text class="ref" x="150" y="278">A1</text>
  <text class="label" x="150" y="325">Drone target</text>
  <text class="small" x="150" y="365">UWB tag and black visual marker</text>

  <rect class="box" x="600" y="210" width="460" height="110"/>
  <text class="ref" x="630" y="248">A2</text>
  <text class="label" x="630" y="292">ESP32-CAM firmware</text>

  <rect class="box" x="600" y="350" width="460" height="110"/>
  <text class="ref" x="630" y="388">A3</text>
  <text class="label" x="630" y="432">3 base anchors + 1 tip anchor</text>

  <rect class="box" x="1160" y="240" width="470" height="170"/>
  <text class="ref" x="1190" y="278">A4</text>
  <text class="label" x="1190" y="325">Host tracker starts</text>
  <text class="small" x="1190" y="365">opens camera stream and UWB serial links</text>

  <rect class="box" x="1730" y="240" width="470" height="170"/>
  <text class="ref" x="1760" y="278">A5</text>
  <text class="label" x="1760" y="325">Vision detection</text>
  <text class="small" x="1760" y="365">find black target center in each frame</text>

  <rect class="box" x="2300" y="240" width="500" height="170"/>
  <text class="ref" x="2330" y="278">A6</text>
  <text class="label" x="2330" y="325">Position fusion</text>
  <text class="small" x="2330" y="365">prefer UWB, then hybrid, then vision fallback</text>

  <rect class="box" x="2900" y="240" width="500" height="170"/>
  <text class="ref" x="2930" y="278">A7</text>
  <text class="label" x="2930" y="325">Target state output</text>
  <text class="small" x="2930" y="365">XYZ, residual, source, capture_ready</text>

  <!-- top arrows -->
  <line class="line" x1="500" y1="295" x2="600" y2="265" marker-end="url(#arrow)"/>
  <line class="line" x1="500" y1="355" x2="600" y2="405" marker-end="url(#arrow)"/>
  <line class="line" x1="1060" y1="265" x2="1160" y2="295" marker-end="url(#arrow)"/>
  <line class="line" x1="1060" y1="405" x2="1160" y2="355" marker-end="url(#arrow)"/>
  <line class="line" x1="1630" y1="325" x2="1730" y2="325" marker-end="url(#arrow)"/>
  <line class="line" x1="2200" y1="325" x2="2300" y2="325" marker-end="url(#arrow)"/>
  <line class="line" x1="2800" y1="325" x2="2900" y2="325" marker-end="url(#arrow)"/>

  <!-- bottom row -->
  <rect class="box" x="120" y="770" width="420" height="190"/>
  <text class="ref" x="150" y="808">B1</text>
  <text class="label" x="150" y="855">Web control UI</text>
  <text class="small" x="150" y="895">operator connects serial, sees telemetry,</text>
  <text class="small" x="150" y="925">and sends mode, pose, and catch commands</text>

  <rect class="box" x="650" y="770" width="480" height="190"/>
  <text class="ref" x="680" y="808">B2</text>
  <text class="label" x="680" y="855">Teensy arm firmware v4</text>
  <text class="small" x="680" y="895">updates sensors, UWB, safety, motion,</text>
  <text class="small" x="680" y="925">and the catch state machine</text>

  <rect class="box" x="1240" y="770" width="430" height="190"/>
  <text class="ref" x="1270" y="808">B3</text>
  <text class="label" x="1270" y="855">Arm outputs</text>
  <text class="small" x="1270" y="895">base, shoulder, elbow, wrist, magnet</text>

  <rect class="box" x="1780" y="770" width="430" height="190"/>
  <text class="ref" x="1810" y="808">B4</text>
  <text class="label" x="1810" y="855">Hand command stage</text>
  <text class="small" x="1810" y="895">host or operator sends pose and grasp</text>
  <text class="small" x="1810" y="925">commands over Nano serial</text>

  <rect class="box" x="2320" y="770" width="460" height="190"/>
  <text class="ref" x="2350" y="808">B5</text>
  <text class="label" x="2350" y="855">Arduino Nano hand firmware</text>
  <text class="small" x="2350" y="895">parses commands and steps five servo</text>
  <text class="small" x="2350" y="925">targets toward open, pregrasp, or close</text>

  <rect class="box" x="2890" y="770" width="470" height="190"/>
  <text class="ref" x="2920" y="808">B6</text>
  <text class="label" x="2920" y="855">Hand outputs</text>
  <text class="small" x="2920" y="895">thumb, index, middle, ring, and pinky</text>
  <text class="small" x="2920" y="925">servos shape the capture pose</text>

  <!-- bottom arrows -->
  <line class="line" x1="540" y1="865" x2="650" y2="865" marker-end="url(#arrow)"/>
  <line class="line" x1="1130" y1="865" x2="1240" y2="865" marker-end="url(#arrow)"/>
  <line class="line" x1="1670" y1="865" x2="1780" y2="865" marker-end="url(#arrow)"/>
  <line class="line" x1="2210" y1="865" x2="2320" y2="865" marker-end="url(#arrow)"/>
  <line class="line" x1="2780" y1="865" x2="2890" y2="865" marker-end="url(#arrow)"/>

  <!-- feedback / cross-links -->
  <rect class="box" x="520" y="1030" width="660" height="120"/>
  <text class="ref" x="550" y="1068">B7</text>
  <text class="label" x="550" y="1112">Telemetry and status feedback</text>
  <text class="small" x="550" y="1142">arm angles, UWB quality, catch state, and errors flow back to the UI</text>

  <rect class="box" x="1600" y="1030" width="760" height="120"/>
  <text class="ref" x="1630" y="1068">B8</text>
  <text class="label" x="1630" y="1112">Closed-loop catch result</text>
  <text class="small" x="1630" y="1142">the arm moves under the target, the hand shapes the grab, and the system either catches or aborts</text>

  <line class="dash" x1="3150" y1="410" x2="3150" y2="770" marker-end="url(#arrow)"/>
  <line class="dash" x1="3150" y1="770" x2="3360" y2="770"/>
  <line class="dash" x1="1450" y1="960" x2="1450" y2="1030" marker-end="url(#arrow)"/>
  <line class="dash" x1="3180" y1="960" x2="3180" y2="1030"/>
  <line class="dash" x1="3180" y1="1030" x2="2360" y2="1030" marker-end="url(#arrow)"/>
  <line class="dash" x1="850" y1="1030" x2="850" y2="960"/>
  <line class="dash" x1="850" y1="1030" x2="330" y2="1030"/>
  <line class="dash" x1="330" y1="1030" x2="330" y2="960" marker-end="url(#arrow)"/>

  <!-- vertical link from target state to control path -->
  <line class="line" x1="3150" y1="410" x2="3150" y2="680"/>
  <line class="line" x1="3150" y1="680" x2="890" y2="680"/>
  <line class="line" x1="890" y1="680" x2="890" y2="770" marker-end="url(#arrow)"/>
</svg>
