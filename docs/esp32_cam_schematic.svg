<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #ffffff; stroke: #000000; stroke-width: 3; }
      .wire { fill: none; stroke: #000000; stroke-width: 3; }
      .thin { fill: none; stroke: #000000; stroke-width: 2; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 32px; font-weight: 700; fill: #000000; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 22px; fill: #000000; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #000000; }
      .ref { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; fill: #000000; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>
  <text class="title" x="60" y="60">ESP32-CAM Standalone Schematic</text>

  <rect class="box" x="90" y="180" width="220" height="120"/>
  <text class="ref" x="115" y="215">J1</text>
  <text class="label" x="115" y="252">5V Logic Supply</text>

  <rect class="box" x="90" y="470" width="240" height="170"/>
  <text class="ref" x="115" y="505">J2</text>
  <text class="label" x="115" y="540">USB-UART Adapter</text>
  <text class="small" x="115" y="570">3.3V UART logic</text>

  <rect class="box" x="700" y="180" width="340" height="380"/>
  <text class="ref" x="725" y="215">U1</text>
  <text class="label" x="725" y="252">AI-Thinker ESP32-CAM</text>

  <text class="small" x="725" y="320">5V</text>
  <text class="small" x="725" y="380">GND</text>
  <text class="small" x="905" y="320">U0R / RX0</text>
  <text class="small" x="905" y="380">U0T / TX0</text>
  <text class="small" x="905" y="440">GPIO0</text>
  <text class="small" x="905" y="500">EN</text>

  <line class="wire" x1="310" y1="240" x2="700" y2="240"/>
  <line class="wire" x1="700" y1="240" x2="700" y2="320"/>
  <text class="label" x="360" y="230">+5V</text>

  <line class="wire" x1="310" y1="280" x2="650" y2="280"/>
  <line class="wire" x1="650" y1="280" x2="700" y2="380"/>
  <text class="label" x="360" y="270">GND</text>

  <line class="wire" x1="330" y1="520" x2="700" y2="320"/>
  <text class="small" x="170" y="515">TX</text>

  <line class="wire" x1="330" y1="570" x2="700" y2="380"/>
  <text class="small" x="170" y="565">RX</text>

  <line class="wire" x1="330" y1="620" x2="650" y2="620"/>
  <line class="wire" x1="650" y1="620" x2="650" y2="280"/>
  <text class="small" x="160" y="615">GND</text>

  <rect class="box" x="1110" y="410" width="170" height="70"/>
  <text class="ref" x="1135" y="438">JP1</text>
  <text class="label" x="1135" y="463">BOOT</text>
  <line class="wire" x1="1040" y1="440" x2="1110" y2="440"/>
  <line class="wire" x1="1280" y1="445" x2="1360" y2="445"/>
  <line class="wire" x1="1360" y1="445" x2="1360" y2="540"/>
  <line class="wire" x1="1340" y1="540" x2="1380" y2="540"/>
  <line class="wire" x1="1345" y1="550" x2="1375" y2="550"/>
  <line class="wire" x1="1350" y1="560" x2="1370" y2="560"/>

  <rect class="box" x="1110" y="470" width="170" height="70"/>
  <text class="ref" x="1135" y="498">SW1</text>
  <text class="label" x="1135" y="523">RESET</text>
  <line class="wire" x1="1040" y1="500" x2="1110" y2="500"/>
  <line class="wire" x1="1280" y1="505" x2="1410" y2="505"/>
  <line class="wire" x1="1410" y1="505" x2="1410" y2="620"/>
  <line class="wire" x1="1390" y1="620" x2="1430" y2="620"/>
  <line class="wire" x1="1395" y1="630" x2="1425" y2="630"/>
  <line class="wire" x1="1400" y1="640" x2="1420" y2="640"/>

  <text class="ref" x="440" y="190">C1</text>
  <line class="thin" x1="470" y1="160" x2="470" y2="250"/>
  <line class="thin" x1="495" y1="160" x2="495" y2="250"/>
  <line class="wire" x1="495" y1="240" x2="495" y2="320"/>
  <line class="wire" x1="475" y1="320" x2="515" y2="320"/>
  <line class="wire" x1="480" y1="330" x2="510" y2="330"/>
  <line class="wire" x1="485" y1="340" x2="505" y2="340"/>
  <line class="wire" x1="310" y1="240" x2="470" y2="240"/>
  <text class="label" x="525" y="242">470uF</text>
</svg>
