<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1400" viewBox="0 0 2400 1400">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .line { fill: none; stroke: #000000; stroke-width: 4; }
      .thin { fill: none; stroke: #000000; stroke-width: 2.5; }
      .box { fill: #ffffff; stroke: #000000; stroke-width: 4; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 42px; font-weight: 700; fill: #000000; }
      .ref { font-family: Arial, Helvetica, sans-serif; font-size: 26px; font-weight: 700; fill: #000000; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 30px; fill: #000000; }
      .pin { font-family: Arial, Helvetica, sans-serif; font-size: 24px; fill: #000000; }
      .net { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; fill: #000000; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="2400" height="1400"/>
  <text class="title" x="70" y="70">Arduino Nano + 5 Servo Hand Controller Schematic</text>

  <!-- Servo PSU -->
  <rect class="box" x="90" y="180" width="340" height="160"/>
  <text class="ref" x="120" y="225">J1</text>
  <text class="label" x="120" y="280">SERVO POWER INPUT</text>
  <text class="pin" x="120" y="315">1  +5V_SERVO</text>
  <text class="pin" x="120" y="345">2  GND</text>

  <!-- USB / logic feed -->
  <rect class="box" x="90" y="950" width="340" height="140"/>
  <text class="ref" x="120" y="995">J7</text>
  <text class="label" x="120" y="1045">NANO POWER / USB</text>
  <text class="pin" x="120" y="1080">5V and GND to Nano only</text>

  <!-- Nano -->
  <rect class="box" x="760" y="650" width="560" height="520"/>
  <text class="ref" x="795" y="695">U1</text>
  <text class="label" x="795" y="750">ARDUINO NANO</text>

  <text class="pin" x="820" y="850">5V</text>
  <text class="pin" x="820" y="915">GND</text>
  <text class="pin" x="820" y="980">D2</text>
  <text class="pin" x="820" y="1045">D3</text>
  <text class="pin" x="820" y="1110">D4</text>
  <text class="pin" x="820" y="1175">D5</text>
  <text class="pin" x="820" y="1240">D6</text>

  <!-- rails -->
  <line class="line" x1="430" y1="250" x2="2220" y2="250"/>
  <text class="net" x="470" y="235">+5V_SERVO</text>

  <line class="line" x1="430" y1="320" x2="2140" y2="320"/>
  <text class="net" x="470" y="305">GND</text>

  <!-- bulk cap -->
  <text class="ref" x="520" y="420">C1</text>
  <line class="thin" x1="560" y1="360" x2="560" y2="460"/>
  <line class="thin" x1="590" y1="360" x2="590" y2="460"/>
  <line class="line" x1="560" y1="360" x2="560" y2="250"/>
  <line class="line" x1="590" y1="460" x2="590" y2="520"/>
  <line class="line" x1="565" y1="520" x2="615" y2="520"/>
  <line class="line" x1="572" y1="533" x2="608" y2="533"/>
  <line class="line" x1="579" y1="546" x2="601" y2="546"/>
  <text class="label" x="630" y="420">2200uF</text>

  <!-- Nano power -->
  <line class="line" x1="430" y1="1000" x2="630" y2="1000"/>
  <line class="line" x1="630" y1="1000" x2="630" y2="850"/>
  <line class="line" x1="630" y1="850" x2="760" y2="850"/>
  <text class="net" x="455" y="988">+5V_LOGIC</text>

  <line class="line" x1="430" y1="1050" x2="680" y2="1050"/>
  <line class="line" x1="680" y1="1050" x2="680" y2="915"/>
  <line class="line" x1="680" y1="915" x2="760" y2="915"/>

  <!-- Servo connectors -->
  <g transform="translate(1550,160)">
    <rect class="box" x="0" y="0" width="360" height="120"/>
    <text class="ref" x="25" y="38">J2</text>
    <text class="label" x="25" y="84">SERVO 1</text>
    <text class="pin" x="240" y="40">1 SIG</text>
    <text class="pin" x="240" y="72">2 V+</text>
    <text class="pin" x="240" y="104">3 GND</text>
  </g>
  <g transform="translate(1550,340)">
    <rect class="box" x="0" y="0" width="360" height="120"/>
    <text class="ref" x="25" y="38">J3</text>
    <text class="label" x="25" y="84">SERVO 2</text>
    <text class="pin" x="240" y="40">1 SIG</text>
    <text class="pin" x="240" y="72">2 V+</text>
    <text class="pin" x="240" y="104">3 GND</text>
  </g>
  <g transform="translate(1550,520)">
    <rect class="box" x="0" y="0" width="360" height="120"/>
    <text class="ref" x="25" y="38">J4</text>
    <text class="label" x="25" y="84">SERVO 3</text>
    <text class="pin" x="240" y="40">1 SIG</text>
    <text class="pin" x="240" y="72">2 V+</text>
    <text class="pin" x="240" y="104">3 GND</text>
  </g>
  <g transform="translate(1550,700)">
    <rect class="box" x="0" y="0" width="360" height="120"/>
    <text class="ref" x="25" y="38">J5</text>
    <text class="label" x="25" y="84">SERVO 4</text>
    <text class="pin" x="240" y="40">1 SIG</text>
    <text class="pin" x="240" y="72">2 V+</text>
    <text class="pin" x="240" y="104">3 GND</text>
  </g>
  <g transform="translate(1550,880)">
    <rect class="box" x="0" y="0" width="360" height="120"/>
    <text class="ref" x="25" y="38">J6</text>
    <text class="label" x="25" y="84">SERVO 5</text>
    <text class="pin" x="240" y="40">1 SIG</text>
    <text class="pin" x="240" y="72">2 V+</text>
    <text class="pin" x="240" y="104">3 GND</text>
  </g>

  <!-- power branches -->
  <line class="line" x1="1910" y1="232" x2="2220" y2="232"/>
  <line class="line" x1="1910" y1="412" x2="2220" y2="412"/>
  <line class="line" x1="1910" y1="592" x2="2220" y2="592"/>
  <line class="line" x1="1910" y1="772" x2="2220" y2="772"/>
  <line class="line" x1="1910" y1="952" x2="2220" y2="952"/>
  <line class="line" x1="2220" y1="232" x2="2220" y2="250"/>
  <line class="line" x1="2220" y1="250" x2="2220" y2="952"/>

  <line class="line" x1="1910" y1="264" x2="2140" y2="264"/>
  <line class="line" x1="2140" y1="264" x2="2140" y2="320"/>
  <line class="line" x1="1910" y1="444" x2="2140" y2="444"/>
  <line class="line" x1="1910" y1="624" x2="2140" y2="624"/>
  <line class="line" x1="1910" y1="804" x2="2140" y2="804"/>
  <line class="line" x1="1910" y1="984" x2="2140" y2="984"/>
  <line class="line" x1="2140" y1="320" x2="2140" y2="984"/>

  <!-- signal lines -->
  <line class="line" x1="1320" y1="980" x2="1450" y2="980"/>
  <line class="line" x1="1450" y1="980" x2="1450" y2="200"/>
  <line class="line" x1="1450" y1="200" x2="1550" y2="200"/>

  <line class="line" x1="1320" y1="1045" x2="1430" y2="1045"/>
  <line class="line" x1="1430" y1="1045" x2="1430" y2="380"/>
  <line class="line" x1="1430" y1="380" x2="1550" y2="380"/>

  <line class="line" x1="1320" y1="1110" x2="1410" y2="1110"/>
  <line class="line" x1="1410" y1="1110" x2="1410" y2="560"/>
  <line class="line" x1="1410" y1="560" x2="1550" y2="560"/>

  <line class="line" x1="1320" y1="1175" x2="1390" y2="1175"/>
  <line class="line" x1="1390" y1="1175" x2="1390" y2="740"/>
  <line class="line" x1="1390" y1="740" x2="1550" y2="740"/>

  <line class="line" x1="1320" y1="1240" x2="1370" y2="1240"/>
  <line class="line" x1="1370" y1="1240" x2="1370" y2="920"/>
  <line class="line" x1="1370" y1="920" x2="1550" y2="920"/>
</svg>
