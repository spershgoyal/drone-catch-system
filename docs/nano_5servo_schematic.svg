  <text class="small" x="105" y="242">External regulated supply</text>

  <rect class="box" x="80" y="520" width="220" height="120"/>
  <text class="ref" x="105" y="555">U1</text>
  <text class="label" x="105" y="592">Arduino Nano</text>

  <rect class="box" x="560" y="120" width="260" height="90"/>
