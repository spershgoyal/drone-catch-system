<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1400" viewBox="0 0 2400 1400">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #ffffff; stroke: #000000; stroke-width: 4; }
      .wire { fill: none; stroke: #000000; stroke-width: 4; }
      .thin { fill: none; stroke: #000000; stroke-width: 3; }
      .dot { fill: #000000; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 40px; font-weight: 700; fill: #000000; }
      .ref { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; fill: #000000; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 28px; fill: #000000; }
      .pin { font-family: Arial, Helvetica, sans-serif; font-size: 22px; fill: #000000; }
      .net { font-family: Arial, Helvetica, sans-serif; font-size: 26px; font-weight: 700; fill: #000000; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="2400" height="1400"/>
  <text class="title" x="70" y="70">Arduino Nano + 5 Servo Hand Controller Schematic</text>

  <!-- Servo power input -->
  <rect class="box" x="90" y="170" width="420" height="210"/>
  <text class="ref" x="125" y="210">J1</text>
  <text class="label" x="125" y="255">SERVO POWER INPUT</text>
  <text class="pin" x="125" y="305">Pin 1  +5V_SERVO</text>
  <text class="pin" x="125" y="345">Pin 2  GND</text>

  <!-- Logic power input -->
  <rect class="box" x="90" y="930" width="420" height="190"/>
  <text class="ref" x="125" y="970">J7</text>
  <text class="label" x="125" y="1015">NANO POWER INPUT</text>
  <text class="pin" x="125" y="1065">Pin 1  +5V_LOGIC</text>
  <text class="pin" x="125" y="1100">Pin 2  GND</text>

  <!-- Arduino Nano -->
  <rect class="box" x="780" y="610" width="560" height="700"/>
  <text class="ref" x="820" y="650">U1</text>
  <text class="label" x="820" y="700">ARDUINO NANO</text>

  <text class="pin" x="840" y="810">5V</text>
  <text class="pin" x="840" y="880">GND</text>
  <text class="pin" x="840" y="955">D2</text>
  <text class="pin" x="840" y="1025">D3</text>
  <text class="pin" x="840" y="1095">D4</text>
  <text class="pin" x="840" y="1165">D5</text>
  <text class="pin" x="840" y="1235">D6</text>

  <!-- Servo connectors -->
  <g transform="translate(1680,130)">
    <rect class="box" x="0" y="0" width="420" height="130"/>
    <text class="ref" x="30" y="40">J2</text>
    <text class="label" x="30" y="88">SERVO 1</text>
    <text class="pin" x="250" y="42">SIG</text>
    <text class="pin" x="250" y="78">V+</text>
    <text class="pin" x="250" y="114">GND</text>
  </g>
  <g transform="translate(1680,320)">
    <rect class="box" x="0" y="0" width="420" height="130"/>
    <text class="ref" x="30" y="40">J3</text>
    <text class="label" x="30" y="88">SERVO 2</text>
    <text class="pin" x="250" y="42">SIG</text>
    <text class="pin" x="250" y="78">V+</text>
    <text class="pin" x="250" y="114">GND</text>
  </g>
  <g transform="translate(1680,510)">
    <rect class="box" x="0" y="0" width="420" height="130"/>
    <text class="ref" x="30" y="40">J4</text>
    <text class="label" x="30" y="88">SERVO 3</text>
    <text class="pin" x="250" y="42">SIG</text>
    <text class="pin" x="250" y="78">V+</text>
    <text class="pin" x="250" y="114">GND</text>
  </g>
  <g transform="translate(1680,700)">
    <rect class="box" x="0" y="0" width="420" height="130"/>
    <text class="ref" x="30" y="40">J5</text>
    <text class="label" x="30" y="88">SERVO 4</text>
    <text class="pin" x="250" y="42">SIG</text>
    <text class="pin" x="250" y="78">V+</text>
    <text class="pin" x="250" y="114">GND</text>
  </g>
  <g transform="translate(1680,890)">
    <rect class="box" x="0" y="0" width="420" height="130"/>
    <text class="ref" x="30" y="40">J6</text>
    <text class="label" x="30" y="88">SERVO 5</text>
    <text class="pin" x="250" y="42">SIG</text>
    <text class="pin" x="250" y="78">V+</text>
    <text class="pin" x="250" y="114">GND</text>
  </g>

  <!-- Servo power rail -->
  <line class="wire" x1="510" y1="300" x2="2260" y2="300"/>
  <text class="net" x="560" y="282">+5V_SERVO</text>

  <!-- Common ground rail -->
  <line class="wire" x1="510" y1="340" x2="2260" y2="340"/>
  <text class="net" x="560" y="372">GND</text>

  <!-- Capacitor on servo rail -->
  <text class="ref" x="620" y="520">C1</text>
  <line class="thin" x1="680" y1="430" x2="680" y2="540"/>
  <line class="thin" x1="715" y1="430" x2="715" y2="540"/>
  <line class="wire" x1="680" y1="430" x2="680" y2="300"/>
  <line class="wire" x1="715" y1="540" x2="715" y2="610"/>
  <line class="wire" x1="690" y1="610" x2="740" y2="610"/>
  <line class="wire" x1="697" y1="623" x2="733" y2="623"/>
  <line class="wire" x1="704" y1="636" x2="726" y2="636"/>
  <text class="label" x="770" y="520">2200uF</text>

  <!-- Logic power lines to Nano -->
  <line class="wire" x1="510" y1="1060" x2="660" y2="1060"/>
  <line class="wire" x1="660" y1="1060" x2="660" y2="810"/>
  <line class="wire" x1="660" y1="810" x2="780" y2="810"/>
  <text class="net" x="535" y="1042">+5V_LOGIC</text>

  <line class="wire" x1="510" y1="1100" x2="720" y2="1100"/>
  <line class="wire" x1="720" y1="1100" x2="720" y2="880"/>
  <line class="wire" x1="720" y1="880" x2="780" y2="880"/>

  <!-- Nano signal lines -->
  <line class="wire" x1="1340" y1="955" x2="1510" y2="955"/>
  <line class="wire" x1="1510" y1="955" x2="1510" y2="172"/>
  <line class="wire" x1="1510" y1="172" x2="1680" y2="172"/>

  <line class="wire" x1="1340" y1="1025" x2="1490" y2="1025"/>
  <line class="wire" x1="1490" y1="1025" x2="1490" y2="362"/>
  <line class="wire" x1="1490" y1="362" x2="1680" y2="362"/>

  <line class="wire" x1="1340" y1="1095" x2="1470" y2="1095"/>
  <line class="wire" x1="1470" y1="1095" x2="1470" y2="552"/>
  <line class="wire" x1="1470" y1="552" x2="1680" y2="552"/>

  <line class="wire" x1="1340" y1="1165" x2="1450" y2="1165"/>
  <line class="wire" x1="1450" y1="1165" x2="1450" y2="742"/>
  <line class="wire" x1="1450" y1="742" x2="1680" y2="742"/>

  <line class="wire" x1="1340" y1="1235" x2="1430" y2="1235"/>
  <line class="wire" x1="1430" y1="1235" x2="1430" y2="932"/>
  <line class="wire" x1="1430" y1="932" x2="1680" y2="932"/>

  <!-- Servo rail branches -->
  <line class="wire" x1="2100" y1="208" x2="2260" y2="208"/>
  <line class="wire" x1="2260" y1="208" x2="2260" y2="300"/>
  <circle class="dot" cx="2260" cy="300" r="6"/>

  <line class="wire" x1="2100" y1="398" x2="2230" y2="398"/>
  <line class="wire" x1="2230" y1="398" x2="2230" y2="300"/>
  <circle class="dot" cx="2230" cy="300" r="6"/>

  <line class="wire" x1="2100" y1="588" x2="2200" y2="588"/>
  <line class="wire" x1="2200" y1="588" x2="2200" y2="300"/>
  <circle class="dot" cx="2200" cy="300" r="6"/>

  <line class="wire" x1="2100" y1="778" x2="2170" y2="778"/>
  <line class="wire" x1="2170" y1="778" x2="2170" y2="300"/>
  <circle class="dot" cx="2170" cy="300" r="6"/>

  <line class="wire" x1="2100" y1="968" x2="2140" y2="968"/>
  <line class="wire" x1="2140" y1="968" x2="2140" y2="300"/>
  <circle class="dot" cx="2140" cy="300" r="6"/>

  <!-- Servo ground branches -->
  <line class="wire" x1="2100" y1="244" x2="2260" y2="244"/>
  <line class="wire" x1="2260" y1="244" x2="2260" y2="340"/>
  <circle class="dot" cx="2260" cy="340" r="6"/>

  <line class="wire" x1="2100" y1="434" x2="2230" y2="434"/>
  <line class="wire" x1="2230" y1="434" x2="2230" y2="340"/>
  <circle class="dot" cx="2230" cy="340" r="6"/>

  <line class="wire" x1="2100" y1="624" x2="2200" y2="624"/>
  <line class="wire" x1="2200" y1="624" x2="2200" y2="340"/>
  <circle class="dot" cx="2200" cy="340" r="6"/>

  <line class="wire" x1="2100" y1="814" x2="2170" y2="814"/>
  <line class="wire" x1="2170" y1="814" x2="2170" y2="340"/>
  <circle class="dot" cx="2170" cy="340" r="6"/>

  <line class="wire" x1="2100" y1="1004" x2="2140" y2="1004"/>
  <line class="wire" x1="2140" y1="1004" x2="2140" y2="340"/>
  <circle class="dot" cx="2140" cy="340" r="6"/>
</svg>
