  <line class="wire" x1="300" y1="625" x2="560" y2="275"/>
  <text class="small" x="200" y="650">D3</text>
  <line class="wire" x1="300" y1="655" x2="560" y2="405"/>
  <text class="small" x="200" y="680">D4</text>
  <line class="wire" x1="300" y1="685" x2="560" y2="535"/>
  <text class="small" x="200" y="710">D5</text>
  <line class="wire" x1="300" y1="715" x2="560" y2="665"/>
