<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #ffffff; stroke: #000000; stroke-width: 3; }
      .wire { fill: none; stroke: #000000; stroke-width: 3; }
      .thin { fill: none; stroke: #000000; stroke-width: 2; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 32px; font-weight: 700; fill: #000000; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 22px; fill: #000000; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #000000; }
      .ref { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; fill: #000000; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1000"/>
  <text class="title" x="60" y="60">Arduino Nano + 5 Servo Hand Schematic</text>

  <rect class="box" x="80" y="140" width="220" height="120"/>
