  <text class="ref" x="910" y="150">C1</text>
  <line class="thin" x1="940" y1="120" x2="940" y2="210"/>
  <line class="thin" x1="965" y1="120" x2="965" y2="210"/>
  <line class="wire" x1="500" y1="180" x2="940" y2="180"/>
  <line class="wire" x1="965" y1="180" x2="965" y2="250"/>
  <line class="wire" x1="945" y1="250" x2="985" y2="250"/>
